  function applyQueryCsvText(csvText, opts = {}) {
    const append = !!opts.append;
    const sourceName = opts.sourceName || 'query';
    if (!append) {
      loadDataFromText(csvText);
      if (rawRows.length) buildGraph();
      return { mergedRows: rawRows.length, addedRows: rawRows.length };
    }

    const pos = capturePositions();
    const before = rawRows.length;
    const parsed = parseCSV(csvText);
    const releaseIds = new Set();
    for (const r of parsed.rows || []) {
      const lh = hostValueFromRow(r, ['localhostname', 'local_host', 'src', 'from']);
      const rh = hostValueFromRow(r, ['remotehostname', 'remote_host', 'dst', 'to']);
      const srcIp = rowValue(r, ['源设备IP', '源设备ip', 'ipaddr', 'sourceip']);
      const dstIp = rowValue(r, ['目的设备IP', '目的设备ip', 'remoteip']);
      collectCandidateNodeIds(lh, srcIp).forEach((id) => releaseIds.add(id));
      collectCandidateNodeIds(rh, dstIp).forEach((id) => releaseIds.add(id));
    }
    releaseNodesFromDeletedStack(releaseIds);
    const added = mergeParsed(parsed, `${sourceName}-append`);
    if (added) sourceRows.push(...parsed.rows);

    $('nRows').textContent = rawRows.length;
    $('nCols').textContent = headers.length;
    if (!headers.length) {
      setStatus('追加失败：无表头');
      setErr('返回内容未检测到有效表头，无法追加。');
      return { mergedRows: 0, addedRows: 0 };
    }

    fillSelect('colLocalHost', autoPickColumn(['localhostname','local_host','src','from']));
    fillSelect('colRemoteHost', autoPickColumn(['remotehostname','remote_host','dst','to']));
    fillSelect('colLocalIf', autoPickColumn(['localinterface','local_if','src_if','from_if']));
    fillSelect('colRemoteIf', autoPickColumn(['remoteinterface','remote_if','dst_if','to_if']));

    if (rawRows.length) buildGraph(pos);
    return { mergedRows: rawRows.length, addedRows: Math.max(0, rawRows.length - before) };
  }

  async function runSqlGenerateAndBuild(startHostnameInputId = 'sqlStartHostnameModal', hintId = 'sqlResultHintModal', action = 'import', opts = {}) {
    const startHostname = ($(startHostnameInputId)?.value || '').trim();
    const maxDepthOpt = Number.isFinite(Number(opts.maxDepth)) ? Number(opts.maxDepth) : null;
    const maxDepth = maxDepthOpt ? Math.min(3, Math.max(1, Math.floor(maxDepthOpt))) : 3;
    if (!startHostname) {
      setErr('请先输入 start_hostname');
      return;
    }
    setErr('');
    setOK('');
    setStatus('SQL 查询中...');
    if ($(hintId)) $(hintId).textContent = '';
    try {
      const base = apiBaseUrl();
      const startResp = await fetch(`${base}/api/sql/lldp-csv/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ start_hostname: startHostname, max_depth: maxDepth })
      });
      const startData = await startResp.json();
      if (!startResp.ok) {
        throw new Error(startData?.detail || `HTTP ${startResp.status}`);
      }
      const taskId = String(startData.task_id || '').trim();
      if (!taskId) throw new Error('SQL 任务创建失败：未返回 task_id');

      let taskData = null;
      const startedAt = Date.now();
      for (;;) {
        await new Promise((r) => setTimeout(r, 1000));
        const pollResp = await fetch(`${base}/api/sql/lldp-csv/tasks/${taskId}`);
        const pollData = await pollResp.json();
        if (!pollResp.ok) throw new Error(pollData?.detail || `HTTP ${pollResp.status}`);
        taskData = pollData;
        const st = String(taskData.status || '');
        const sec = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
        if ($(hintId) && (st === 'queued' || st === 'running')) {
          $(hintId).textContent = `SQL 查询执行中，task=${taskId.slice(0, 8)}，已耗时 ${sec}s`;
          continue;
        }
        if (st === 'failed') throw new Error(String(taskData.error || 'SQL 任务执行失败'));
        if (st === 'completed') break;
        throw new Error(`未知 SQL 任务状态：${st || 'N/A'}`);
      }
      const data = taskData?.response || {};
      if (!data.download_url) throw new Error('SQL 返回缺少下载地址');
      const csvResp = await fetch(`${base}${data.download_url}`);
      if (!csvResp.ok) throw new Error(`下载 SQL 结果失败：HTTP ${csvResp.status}`);
      const csvText = await csvResp.text();
      if (!csvText.trim()) throw new Error('SQL 返回为空');

      lastSqlDownloadUrl = data.download_url ? `${base}${data.download_url}` : '';
      const shownRows = Number(data.row_count || 0);
      if ($(hintId)) $(hintId).textContent = `SQL 返回 ${shownRows} 行，临时文件：${data.temp_file}${ctxAppendSingleHop ? '（右键单轮）' : ''}`;
      const merged = applyQueryCsvText(csvText, { append: action === 'append', sourceName: 'sql' });
      if (action === 'append') {
        setStatus('SQL 数据已追加并生成拓扑');
        const hint = (shownRows > 0 && merged.addedRows === 0) ? '（结果已存在于当前图）' : '';
        setOK(`已按 ${startHostname} 追加查询，SQL 返回 ${shownRows} 行，新增 ${merged.addedRows} 行${hint}，当前总计 ${merged.mergedRows} 行。`);
      } else {
        setStatus('SQL 数据已载入并生成拓扑');
        setOK(`已按 ${startHostname} 生成拓扑，结果 ${data.row_count} 行。`);
      }
    } catch (e) {
      setStatus('SQL 生成失败');
      setErr(`SQL 查询失败：${String(e && e.message ? e.message : e)}`);
      if ($(hintId)) $(hintId).textContent = '请确认通过服务启动页面：http://127.0.0.1:18080/lldp.html';
    } finally {
      ctxAppendSingleHop = false;
    }
  }

  async function loadUtilCacheFromServer() {
    const base = apiBaseUrl();
    try {
      const resp = await fetch(`${base}/api/cli/link-utilization-cache`);
      if (!resp.ok) return false;
      const data = await resp.json();
      const rows = Array.isArray(data?.rows) ? data.rows : [];
      const map = new Map();
      rows.forEach((r) => {
        const key = String(r?.util_key || '').toLowerCase();
        if (!key) return;
        map.set(key, {
          ...r,
          tx_pct: (typeof r.tx_pct === 'number') ? r.tx_pct : (r.tx_pct === null || r.tx_pct === '' ? null : Number(r.tx_pct)),
          rx_pct: (typeof r.rx_pct === 'number') ? r.rx_pct : (r.rx_pct === null || r.rx_pct === '' ? null : Number(r.rx_pct)),
          used_pct: (typeof r.used_pct === 'number') ? r.used_pct : (r.used_pct === null || r.used_pct === '' ? null : Number(r.used_pct)),
        });
      });
      utilByKey = map;
      utilCacheLoadedAt = new Date().toISOString();
      if (cy) applyUtilizationToEdges();
      return true;
    } catch (_) {
      return false;
    }
  }

  function buildUtilTargetsFromRows() {
    const colLH = $('colLocalHost').value;
    const colLI = $('colLocalIf').value;
    const allByUtilKey = new Map();
    for (const r of rawRows) {
      const srcRaw = String(r[colLH] || '').trim();
      const srcIf = String(r[colLI] || '').trim();
      if (!srcRaw || !srcIf) continue;
      const sourceIpHint = rowValue(r, ['源设备IP', '源设备ip', 'ipaddr', 'sourceip']);
      const utilKey = buildUtilKey(srcRaw, srcIf, sourceIpHint);
      if (!utilKey) continue;
      const dedupeKey = utilKey;
      let queryDevice = isIpv4(sourceIpHint) ? sourceIpHint : srcRaw;
      if (!isIpv4(queryDevice)) {
        const mapHit = deviceNameToIpMap.get(srcRaw) || deviceNameToIpMap.get(stripAfterDot(srcRaw));
        const hit1 = nodeIpMap.get(srcRaw);
        const hit2 = nodeIpMap.get(stripAfterDot(srcRaw));
        const cand = mapHit || hit1 || hit2;
        if (cand && isIpv4(cand)) queryDevice = cand;
      }
      if (!allByUtilKey.has(utilKey)) {
        allByUtilKey.set(utilKey, {
          source_device: queryDevice,
          source_interface: srcIf,
          util_key: utilKey,
          dedupe_key: dedupeKey
        });
      }
    }

    // Query all currently visible source ports; cache skip happens later.
    const neededUtilKeys = new Set();
    if (cy) {
      cy.edges(':visible').forEach((e) => {
        const keys = e.data('utilKeys');
        if (Array.isArray(keys)) {
          keys.forEach((k) => { if (k) neededUtilKeys.add(String(k).toLowerCase()); });
          return;
        }
        const single = e.data('utilKey');
        if (single) neededUtilKeys.add(String(single).toLowerCase());
      });
    }

    const out = [];
    const seenDedupe = new Set();
    const source = neededUtilKeys.size ? neededUtilKeys : new Set(allByUtilKey.keys());
    source.forEach((k) => {
      const item = allByUtilKey.get(k);
      if (!item) return;
      if (seenDedupe.has(item.dedupe_key)) return;
      seenDedupe.add(item.dedupe_key);
      out.push({
        source_device: item.source_device,
        source_interface: item.source_interface,
        util_key: item.util_key
      });
    });
    return out;
  }

  function hasSuccessfulUtilCache(utilKey) {
    const k = String(utilKey || '').toLowerCase();
    if (!k) return false;
    const hit = utilByKey.get(k);
    return !!(hit && hit.status === 'ok' && typeof hit.used_pct === 'number');
  }

  async function refreshLinkUtilization() {
    if (!cy || !rawRows.length) {
      setErr('请先生成拓扑，再刷新链路利用率');
      return;
    }
    const allTargets = buildUtilTargetsFromRows();
    if (!allTargets.length) {
      setErr('未找到可查询的 source 设备端口');
      return;
    }
    const targets = allTargets.filter(t => !hasSuccessfulUtilCache(t.util_key));
    const skippedCached = allTargets.length - targets.length;
    if (!targets.length) {
      applyUtilizationToEdges();
      $('utilResultHint').textContent = `无需刷新：当前可见链路端口 ${allTargets.length} 个，已缓存成功 ${skippedCached} 个。`;
      setOK('链路利用率已是最新缓存结果（仅新增链路会触发查询）');
      return;
    }
    const btn = $('refreshUtilization');
    const old = btn.textContent;
    btn.disabled = true;
    btn.textContent = '查询中...';
    setErr('');
    const startedAt = Date.now();
    const hintBase = `正在增量查询 ${targets.length} 个 source 端口（跳过已缓存 ${skippedCached} 个）`;
    $('utilResultHint').textContent = `${hintBase}...`;
    const workersRaw = parseInt(($('cliMaxWorkersModal')?.value || '4').trim(), 10);
    const maxWorkers = Number.isFinite(workersRaw) ? Math.min(16, Math.max(1, workersRaw)) : 4;
    const metric = (($('utilMetric')?.value || 'tx').trim().toLowerCase());
    const runtimeCfg = await ensureCliCredentials('未检测到设备 SSH 用户名/密码，请先输入后再执行链路利用率查询。');
    if (!runtimeCfg) {
      setErr('已取消链路利用率查询：未提供设备用户名/密码');
      btn.disabled = false;
      btn.textContent = old;
      return;
    }
    // Utilization query should fail fast; avoid inheriting overly large CLI import timeouts.
    runtimeCfg.cli_connect_timeout = Math.min(20, Math.max(5, Number(runtimeCfg.cli_connect_timeout || 20)));
    runtimeCfg.cli_command_timeout = Math.min(20, Math.max(5, Number(runtimeCfg.cli_command_timeout || 20)));
    const reqPayload = {
      targets,
      metric,
      cli_max_workers: maxWorkers,
      debug_enabled: !!$('utilDebugEnabled')?.checked,
      ...runtimeCfg
    };
    const base = apiBaseUrl();
    try {
      const startResp = await fetch(`${base}/api/cli/link-utilization/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(reqPayload)
      });
      const startData = await startResp.json();
      if (!startResp.ok) throw new Error(startData?.detail || `HTTP ${startResp.status}`);
      const taskId = String(startData.task_id || '').trim();
      if (!taskId) throw new Error('任务创建失败：未返回 task_id');

      let taskData = null;
      for (;;) {
        await new Promise((r) => setTimeout(r, 1000));
        const pollResp = await fetch(`${base}/api/cli/link-utilization/tasks/${taskId}`);
        const pollData = await pollResp.json();
        if (!pollResp.ok) throw new Error(pollData?.detail || `HTTP ${pollResp.status}`);
        taskData = pollData;
        const st = String(taskData.status || '');
        const prog = taskData.progress || {};
        const finished = Number(prog.finished_devices || 0);
        const total = Number(prog.total_devices || 0);
        const cur = String(prog.current_device || '');
        const sec = Math.max(
          Math.floor((Date.now() - startedAt) / 1000),
          Math.floor(Number(prog.elapsed_seconds || 0))
        );
        if (st === 'queued' || st === 'running') {
          const doneText = total ? `${finished}/${total}` : `${finished}`;
          $('utilResultHint').textContent = `${hintBase}，设备进度 ${doneText}，已耗时 ${sec}s${cur ? `，当前 ${cur}` : ''}`;
          continue;
        }
        if (st === 'failed') {
          throw new Error(String(taskData.error || '任务失败'));
        }
        if (st === 'cancelled') {
          throw new Error('任务已取消');
        }
        if (st === 'completed') break;
        throw new Error(`未知任务状态：${st || 'N/A'}`);
      }

      const data = taskData?.response || {};
      if (!data || typeof data !== 'object') throw new Error('任务完成但结果为空');
      lastUtilDebugUrl = data.debug_download_url ? `${base}${data.debug_download_url}` : '';
      const beforeOkCount = Array.from(utilByKey.values()).filter(v => v && v.status === 'ok').length;
      for (const r of (data.results || [])) {
        const key = String(r.util_key || `${r.source_device || ''}||${r.source_interface || ''}`).toLowerCase();
        if (!key) continue;
        utilByKey.set(key, r);
      }
      applyUtilizationToEdges();
      const results = Array.isArray(data.results) ? data.results : [];
      const okCount = results.filter(r => r && r.status === 'ok').length;
      const noDataCount = results.filter(r => r && r.status === 'no_data').length;
      const failCount = results.filter(r => r && r.status === 'failed').length;
      const firstErr = results.find(r => r && r.error)?.error || '';
      const secs = Number(data.total_elapsed_seconds || 0).toFixed(1);
      const totalOkCount = Array.from(utilByKey.values()).filter(v => v && v.status === 'ok').length;
      const debugText = (reqPayload.debug_enabled && lastUtilDebugUrl) ? '，已生成调试日志' : '';
      const cacheText = `，缓存更新 ${Number(data.cache_updates || 0)}，缓存总计 ${Number(data.cache_total || 0)}`;
      const perDevTimeoutText = data.per_device_timeout ? `，单设备超时 ${data.per_device_timeout}s` : '';
      $('utilResultHint').textContent = `利用率已增量更新：本次查询 ${targets.length}（跳过已缓存 ${skippedCached}），查询设备 ${(data.queried_devices || []).length}，耗时 ${secs}s，口径 ${metric.toUpperCase()}，本次成功 ${okCount}，无数据 ${noDataCount}，失败 ${failCount}，累计成功 ${totalOkCount}${perDevTimeoutText}${cacheText}${debugText}`;
      if (okCount === 0) {
        const sample = targets.slice(0, 5).map(t => t.source_device).join(', ');
        setErr(`链路利用率未获取到有效结果。${firstErr ? `首个错误：${firstErr}。` : ''}样例查询设备：${sample}`);
      } else {
        setOK(`链路利用率刷新成功（新增成功 ${Math.max(0, totalOkCount - beforeOkCount)}）`);
      }
      applyAdaptiveRenderMode();
    } catch (e) {
      const msg = String(e && e.message ? e.message : e);
      setErr(`刷新链路利用率失败：${msg}`);
      $('utilResultHint').textContent = `链路利用率查询失败：${msg}`;
    } finally {
      btn.disabled = false;
      btn.textContent = old;
    }
  }

  async function ensureCliCredentials(reason = '') {
    let runtime = readCliRuntimeInputs();
    if (runtime.device_username && runtime.device_password) return runtime;
    const creds = await openCliCredModal(reason);
    if (!creds) return null;
    if ($('cliUsernameModal')) $('cliUsernameModal').value = creds.username;
    if ($('cliPasswordModal')) $('cliPasswordModal').value = creds.password;
    if (creds.password) lastCliPassword = creds.password;
    runtime = readCliRuntimeInputs();
    if (runtime.device_username && runtime.device_password) return runtime;
    return null;
  }

      device_address: addr,
      max_depth: maxDepth,
      cli_max_workers: maxWorkers,
      recursive_only_172: recursiveOnly172,
      ...runtimeCfg

      method: 'POST',

      .then(async (resp) => {

        if (!resp.ok) throw new Error(data?.detail || `HTTP ${resp.status}`);
        if (!data.csv_text) throw new Error('CLI 返回为空');
        stopCliTimer();
        lastSqlDownloadUrl = data.download_url ? `${base}${data.download_url}` : '';
        lastCliDebugUrl = data.debug_download_url ? `${base}${data.debug_download_url}` : '';
        const workersShown = data.cli_max_workers || maxWorkers;
        const elapsedSec = Math.max(0, Math.floor((Date.now() - cliStartedAt) / 1000));
        const only172Text = (data.recursive_only_172 ? '，仅172递归' : '');

        $('cliResultHintModal').textContent = `CLI 返回 ${data.row_count} 行，已查询设备 ${data.queried_count} 台，并发 ${workersShown}${only172Text}，总用时 ${elapsedSec}s`;
        const merged = applyQueryCsvText(data.csv_text, { append: importInputAction === 'append', sourceName: 'cli' });
        if (importInputAction !== 'append' && addr) {
          primaryCliSource = addr;

        if ((data.row_count || 0) > 0) {

            setStatus(`CLI 数据已追加并生成拓扑（总用时 ${elapsedSec}s）`);

          }
        } else {
          setStatus(`CLI 查询完成（无可用邻接，总用时 ${elapsedSec}s）`);
          setErr('CLI 查询成功，但未解析到可用 LLDP 邻接记录。请下载 CLI 调试日志检查原始回显。');
        }
        const vendors = data.detected_vendors ? Object.values(data.detected_vendors).join(', ') : 'unknown';
        if (importInputAction === 'append') {
          setOK(`已完成 CLI 追加采集：起始设备 ${addr}，递归 ${maxDepth} 层，并发 ${workersShown}${only172Text}，总用时 ${elapsedSec}s，新增 ${merged.addedRows} 行，当前总计 ${merged.mergedRows} 行。自动识别厂商：${vendors}`);

        }

        stopCliTimer();
        setStatus('CLI 查询失败');
        setErr(`CLI 查询失败：${String(e && e.message ? e.message : e)}`);
      })
      .finally(() => {
        stopCliTimer();
        ctxAppendSingleHop = false;

  $('exportPng').addEventListener('click', async () => {
    if (!cy) { setErr('请先生成拓扑，再导出 PNG'); return; }
    const btn = $('exportPng');
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '导出中...';
    setErr('');
    setOK('正在导出 PNG...');

    const attempts = [
      { bg: '#ffffff', full: true, scale: 2, output: 'blob-promise' },
      { bg: '#ffffff', full: true, scale: 1, output: 'blob-promise' },
      { bg: '#ffffff', full: false, scale: 2, output: 'blob-promise' },
      { bg: '#ffffff', full: false, scale: 1, output: 'blob-promise' }
    ];

    let blob = null;
    let lastErr = null;
    let fallbackDataUrl = '';
    for (const cfg of attempts) {
      try {
        blob = await cy.png(cfg);
        if (blob) break;
      } catch (e) {
        lastErr = e;
      }
    }

    if (!blob) {
      try {
        fallbackDataUrl = cy.png({ bg: '#ffffff', full: false, scale: 1 });
      } catch (e) {
        lastErr = e;
      }
    }

    if (!blob && !fallbackDataUrl) {
      const msg = lastErr && lastErr.message ? lastErr.message : String(lastErr || '未知错误');
      setErr(`导出 PNG 失败：${msg}`);
      btn.disabled = false;
      btn.textContent = oldText;
      return;
    }

    const ts = new Date().toISOString().replace(/[:T]/g, '-').slice(0, 19);
    const ok = blob
      ? downloadBlob(`lldp-topology-${ts}.png`, blob, fallbackDataUrl)
      : downloadBlob(`lldp-topology-${ts}.png`, new Blob(), fallbackDataUrl);
    if (!ok) {
      setErr('导出 PNG 失败：浏览器阻止下载或数据不可用');
      btn.disabled = false;
      btn.textContent = oldText;
      return;
    }
    setOK('PNG 导出成功');
    btn.disabled = false;
    btn.textContent = oldText;
  });

  $('ctxCopy').addEventListener('click', async () => {

  $('ctxCopyIp').addEventListener('click', async () => {
    const nodes = ctxNodes();
    if (!nodes.length) return hideCtx();
    const ips = [];
    nodes.forEach((n) => {
      const fromNode = String(n.data('ip') || '').trim();
      if (fromNode && isIpv4(fromNode)) ips.push(fromNode);
      const fallback = collectNodeIpsFromRows(n);
      fallback.forEach((ip) => ips.push(ip));
    });
    if (!ips.length) {
      setErr('选中节点未找到可复制地址');
      return hideCtx();
    }
    const text = Array.from(new Set(ips)).join('\n');
    try {
      await navigator.clipboard.writeText(text);
      setOK(`已复制 ${ips.length} 个地址`);
    } catch (_) {
      setErr('复制失败，可能浏览器不支持或权限受限');
    }
    hideCtx();
  });

  function collectNodeIpsFromRows(node) {
    if (!node) return [];
    const label = String(node.data('label') || '').trim();
    const shortLabelText = stripAfterDot(label);
    if (!label) return [];
    const colLH = $('colLocalHost')?.value || 'localhostname';
    const colRH = $('colRemoteHost')?.value || 'remotehostname';
    const out = new Set();
    for (const r of rawRows) {
      const lh = String(r[colLH] || '').trim();
      const rh = String(r[colRH] || '').trim();
      const srcIp = rowValue(r, ['源设备IP', '源设备ip', 'ipaddr', 'sourceip']);
      const dstIp = rowValue(r, ['目的设备IP', '目的设备ip', 'remoteip']);
      if (lh && (lh === label || stripAfterDot(lh) === shortLabelText) && isIpv4(srcIp)) {
        out.add(srcIp);
      }
      if (rh && (rh === label || stripAfterDot(rh) === shortLabelText) && isIpv4(dstIp)) {
        out.add(dstIp);
      }
    }
    return Array.from(out);
  }

  function resolveCliQueryTargetForNode(node) {
    if (!node) return '';
    const label = (node.data('label') || '').trim();
    const shortLabelText = stripAfterDot(label);
    const nodeIp = (node.data('ip') || '').trim();
    const ipv4 = (s) => /^(?:\d{1,3}\.){3}\d{1,3}$/.test(String(s || '').trim());
    if (nodeIp && ipv4(nodeIp)) return nodeIp;
    if (label && ipv4(label)) return label;

    const mapHits = [
      deviceNameToIpMap.get(label),
      deviceNameToIpMap.get(shortLabelText),
      nodeIpMap.get(label),
      nodeIpMap.get(shortLabelText),
    ].filter(Boolean);
    const direct = mapHits.find(ipv4);
    if (direct) return direct;

    // Fallback: scan current raw rows for matching remote host -> remote IP column.
    const colRH = $('colRemoteHost')?.value || 'remotehostname';
    const colRIP = headers.find((h) => ['目的设备ip', 'remoteip', 'remote_ip', 'mgmtip'].includes(String(h || '').toLowerCase()));
    if (colRIP) {
      for (const r of rawRows) {
        const rh = String(r[colRH] || '').trim();
        const rip = String(r[colRIP] || '').trim();
        if (!rip || !ipv4(rip)) continue;
        if (rh === label || stripAfterDot(rh) === shortLabelText) return rip;
      }
    }

    // Last fallback to label (for environments where jump host can resolve it).
    return label;
  }

  $('ctxAppendQuery').addEventListener('click', async () => {
    const nodes = ctxNodes();
    if (!nodes.length) return hideCtx();
    const node = nodes[0];
    const label = (node.data('label') || '').trim();
    const ip = (node.data('ip') || '').trim();
    const mode = ($('importMode')?.value || 'sql').toLowerCase();

    if (mode === 'csv') {
      setErr('CSV 模式不支持右键追加查询，请切换为 SQL 或 CLI。');
      return hideCtx();
    }

    importInputAction = 'append';
    ctxAppendSingleHop = true;
    hideCtx();

      if (mode === 'sql') {
      // Prefer management IP for SQL append to avoid hostname alias drift.
      const target = ip || label;
      if (!target) {
        setErr('当前节点没有可用于 SQL 查询的设备名称。');
        return;
      }
      $('sqlStartHostnameModal').value = target;
      setOK(`正在以 SQL 方式追加查询：${target}`);
      await runSqlGenerateAndBuild('sqlStartHostnameModal', 'sqlResultHintModal', 'append', { maxDepth: 1 });
      return;
    }

    // CLI mode: strongly prefer management IP to avoid jump-host DNS resolution failures.
    const target = resolveCliQueryTargetForNode(node);
    if (!target) {
      setErr('当前节点没有可用于 CLI 查询的设备地址/名称。');
      return;

    $('cliDeviceAddrModal').value = target;

    const terms = parseTerms(e.target.value);
    if (!terms.length) return;

    const hits = cy.nodes().filter(n => {
      const label = (n.data('label') || '');
      return terms.some(t => matchTermInName(label, t));
    });

    cy.elements().removeClass('hit dim');
    cy.elements().unselect();

    if (hits.length) {
      hits.select();
      hits.addClass('hit');
      cy.animate({ fit: { eles: hits, padding: 140 }, duration: 450 });

$('filter').addEventListener('keydown', (e) => {

  $('restoreDeleted').addEventListener('click', () => {
    runWithRollback(() => {
      if (!cy) return;
      if (!deletedStack.length) { setOK('没有可恢复的删除记录'); return; }
      const popped = deletedStack.pop() || [];
      const restored = Array.isArray(popped) ? popped.length : 0;
      rebuildDeletedNodeIdsFromStack();
      const pos = capturePositions();
      buildGraph(pos);
      setOK(`已恢复 ${restored} 个删除设备。`);

      if (!cy) return;
      const nodes = cy.nodes(':selected');

      const ids = nodes.map(n => n.id());

      nodes.remove();

      setOK(`已删除选中 ${nodes.length} 个节点及其相关边`);

  $('keepSelected').addEventListener('click', () => {
    runWithRollback(() => {
      if (!cy) return;
      const selected = cy.nodes(':selected');
      if (!selected.length) { setOK('未选中节点，无法删除未选中设备。'); return; }
      const removeNodes = cy.nodes().difference(selected);
      if (!removeNodes.length) { setOK('当前没有未选中设备可删除。'); return; }
      const ids = removeNodes.map(n => n.id());
      pushDeletedNodeIds(ids);
      removeNodes.remove();
      updateCounts();
      setOK(`已删除未选中 ${removeNodes.length} 个节点，保留选中 ${selected.length} 个节点（可恢复）。`);
    }, { delayMs: 0 });
  });
  $('rollbackStep').addEventListener('click', () => {
    if (!rollbackState.before || !rollbackState.after) {
      setOK('暂无可回退操作。');
      return;
    }
    rollbackArmSeq += 1;
    const target = rollbackState.atBefore ? rollbackState.after : rollbackState.before;
    const ok = applyRollbackSnapshot(target);
    if (!ok) {
      setErr('回退失败：快照不可用。');
      return;
    }
    rollbackState.atBefore = !rollbackState.atBefore;
    updateRollbackButtonState();
    if (rollbackState.atBefore) {
      setOK('已回到上一步，再点一次可回到变更后状态。');
    } else {
      setOK('已回到变更后状态。');
    }
  });
