<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLDP Topology Builder (Final)</title>

  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.1/cytoscape-fcose.min.js"></script>

  <style>
    @import url('/shared/header/shared-header.css');
    :root {
      --sea-blue: #0f6fff;
      --sea-dark: #0f172a;
      --sea-gray: #e5e7eb;
    }
    body { margin: 0; font-family: "Segoe UI", -apple-system, system-ui, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f8fafc; }
    .wrap { display: grid; grid-template-columns: 430px 1fr; height: calc(100vh - 106px); }
    .panel { padding: 14px; border-right: 1px solid #e5e7eb; overflow: auto; background: #ffffff; box-shadow: 4px 0 24px rgba(0,0,0,0.04); }
    #cy { height: 100%; width: 100%; background: #ffffff; }

    h1 { font-size: 17px; margin: 0 0 10px; letter-spacing: 0.2px; }
    h2 { font-size: 13px; margin: 14px 0 6px; color: #374151; }
    .hint { font-size: 12px; color: #6b7280; line-height: 1.45; }
    .box { padding: 10px; border: 1px solid #e5e7eb; border-radius: 12px; margin: 10px 0; background: linear-gradient(180deg,#fff,#f9fafb); }
    .section-box { padding: 10px; border: 1px solid #e5e7eb; border-radius: 12px; margin: 10px 0; background: linear-gradient(180deg,#fff,#f9fafb); }
    .section-box h2 { margin: 0 0 8px; }
    .util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .util-grid .span-2 { grid-column: 1 / -1; }
    .util-grid .check-row { display:flex; align-items:center; gap:8px; font-size:12px; color:#111827; font-weight:600; }
    .util-grid .check-row input[type="checkbox"] { width:auto; margin:0; }
    .row { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 10px 0; }
    .row.inline { grid-template-columns: 1fr 1fr; gap: 10px; }
    .action-group {
      border: 1px dashed #d7dfeb;
      border-radius: 10px;
      background: #ffffff;
      padding: 8px;
      margin: 10px 0;
    }
    .action-group-title {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      margin: 2px 0 6px;
      letter-spacing: 0.2px;
    }
    .action-group .row { margin: 6px 0; }
    label { font-size: 12px; color: #111827; font-weight: 600; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; }
    input[type="text"], input[type="number"], input[type="password"], select, textarea {
      padding: 9px 11px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 13px; outline: none; transition: border-color .15s, box-shadow .15s;
      appearance: none;
      -webkit-appearance: none;
      background: #fff;
    }
    input[type="text"]:focus, input[type="number"]:focus, input[type="password"]:focus, select:focus, textarea:focus {
      border-color: var(--sea-blue); box-shadow: 0 0 0 2px rgba(15,111,255,0.16);
    }
    textarea { resize: vertical; min-height: 90px; }
    button {
      padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 10px; background: #fff; cursor: pointer; font-size: 13px; transition: transform .08s ease, box-shadow .12s, filter .12s;
    }
    button.primary { border-color: var(--sea-blue); background: var(--sea-blue); color: #fff; box-shadow: 0 8px 16px rgba(15,111,255,0.18); }
    button:hover { filter: brightness(0.98); transform: translateY(-1px); }
    .ok { color: #047857; font-size: 12px; white-space: pre-wrap; }
    .err { color: #b91c1c; font-size: 12px; white-space: pre-wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .kvs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
    .kvs div { font-size: 12px; color: #374151; }
    .kvs b { color: #111827; }
    .drop { border: 1px dashed #cbd5e1; padding: 10px; border-radius: 10px; background: #fff; }
    input[type="range"] { width: 100%; accent-color: var(--sea-blue); }
    .badge { display:inline-block; padding:2px 6px; border-radius: 999px; background:#e9f2ff; font-size:11px; color:var(--sea-blue); margin-left:6px; }
    .filtered { display: none; }
    .sel-hidden { display: none; }
    .selected-overlay {
      box-shadow: 0 0 0 3px rgba(15, 111, 255, 0.35);
      border-color: var(--sea-blue) !important;
    }
    .top-hero { width: 100%; }
    @media (max-width: 740px) {
      .util-grid { grid-template-columns: 1fr; }
      .util-grid .span-2 { grid-column: auto; }
    }
    #ctxMenu {
      position: fixed;
      z-index: 9999;
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 6px 0;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      min-width: 140px;
      display: none;
      font-size: 13px;
    }
    #ctxMenu button {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: inherit;
      padding: 8px 12px;
      cursor: pointer;
    }
    #ctxMenu button:hover { background: #1f2937; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 14px;
    }
    .modal-card {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      padding: 14px;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin: 0 0 8px; color: #111827; }
    .modal-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .modal-actions button { width: auto; min-width: 110px; }
    .modal-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      align-items: end;
    }
    .modal-form-grid .span-2 {
      grid-column: 1 / -1;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      color: #111827;
    }
    .hidden { display: none !important; }
    @media (max-width: 740px) {
      .modal-form-grid { grid-template-columns: 1fr; }
      .modal-form-grid .span-2 { grid-column: auto; }
    }
  </style>
</head>
<body>
<div class="top-hero">
  <div class="app-topbar">
    <div class="app-brand">
      <img class="infra-logo" src="/shared/header/infra-logo.png" alt="infra logo" />
    </div>
    <div class="app-top-links">
      <a id="manualLink" class="app-circle-btn" href="lldp-manual.html" target="_blank" title="查看使用手册">?</a>
      <button id="lang_toggle_btn" class="app-circle-btn" type="button" title="切换语言">EN</button>
    </div>
  </div>
  <div class="app-mainnav">
    <div id="appTitle" class="app-title">AIOps - LLDP Topology Runner</div>
  </div>
</div>
<div class="wrap">
  <div class="panel">
    <div class="box">
      <div><b id="statusLabel">状态：</b><span id="status">等待导入</span></div>
      <div class="kvs" style="margin-top:8px;">
        <div>输入行数：<b id="nRows">-</b></div>
        <div>列数：<b id="nCols">-</b></div>
        <div>节点数：<b id="nNodes">-</b></div>
        <div>边数(去重)：<b id="nEdges">-</b></div>
      </div>
      <div class="ok" id="ok"></div>
      <div class="err" id="err"></div>
    </div>

    <div class="section-box">
      <h2 id="secImportTitle">导入数据</h2>
      <div class="row inline">
        <div>
          <label id="lblImportMode">导入方式</label>
          <select id="importMode">
            <option value="sql">SQL 导入</option>
            <option value="cli">CLI 导入</option>
            <option value="csv">CSV 导入</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <div class="row inline" style="margin:0;">
            <button id="openImportModalImport" class="primary">导入输入</button>
            <button id="openImportModalAppend">追加输入</button>
          </div>
        </div>
      </div>
      <div class="hint" id="importHint">导入输入会覆盖当前结果；追加输入会把新查询结果合并到当前图中，补充链路。</div>
      <div style="display:none">
        <input id="file" type="file" accept=".csv,text/csv" multiple />
        <input id="appendFile" type="file" accept=".csv,text/csv" multiple />
      </div>
    </div>

    <div class="hidden">
      <select id="colLocalHost"></select>
      <select id="colRemoteHost"></select>
      <select id="colLocalIf"></select>
      <select id="colRemoteIf"></select>
    </div>

    <div class="section-box">
      <h2 id="secLayoutTitle">布局 & 分散</h2>
      <div class="row inline">
        <div>
          <label>布局模式</label>
          <select id="layoutMode">
            <option value="force">仅强分散（COSE）</option>
            <option value="layer" selected>上下分层（手动关键字）</option>
            <option value="circle">圆形环状</option>
          </select>
        </div>
        <div>
          <label>去掉 hostname 域名后缀</label>
          <select id="stripDomain">
            <option value="yes" selected>是（删掉 '.' 后面）</option>
            <option value="no">否</option>
          </select>
        </div>
      </div>

      <div class="row inline">
        <div>
          <label>节点标签</label>
          <select id="nodeLabelMode">
            <option value="short">缩略（推荐）</option>
            <option value="full" selected>全名（容易挤）</option>
          </select>
        </div>
        <div>
          <label>端口标签</label>
          <select id="edgeLabelMode">
            <option value="none" selected>不显示</option>
            <option value="both">一直显示（可能拥挤）</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label>定位设备（关键字逗号分隔，回车多选）</label>
        <input id="search" type="text" placeholder="例如：MGMT,AGGR" />
        <div class="hint" id="searchResult"></div>
      </div>
      <div class="row">
        <label>不显示：逗号分隔，命中的设备会被隐藏</label>
        <input id="filter" type="text" placeholder="例如：lab,backup" value="MGMT,null,ACC,SA" />
      </div>
      <div class="row">
        <label>只显示：逗号分隔，回车生效（仅显示命中的设备，其余隐藏）</label>
        <input id="showOnly" type="text" placeholder="例如：CORE,EDGE" />
      </div>
      <div class="row">
        <label>分层关键字（高->低，逗号分层，斜杠同层，&需全部命中，如 EDGE&CORE,CORE,AGGR/SPINE,LEAF/tor）</label>
        <input id="layerTerms" type="text" value="EDGE,CORE,AGGR,LEAF" />
      </div>
      <div class="row">
        <label>分区关键字（左->右分区，逗号分区，斜杠同区，&需全部命中，如 PAY/SHOP,MGMT&CORE,EDGE）</label>
        <input id="bizIsolationTerms" type="text" placeholder="例如：PAY/SHOP,MGMT,EDGE" />
      </div>
      <div class="row inline">
        <div>
          <label>名称相似聚拢</label>
          <select id="nameClusterMode">
            <option value="on" selected>开启</option>
            <option value="off">关闭</option>
          </select>
        </div>
        <div>
          <label>近似度强度 <span class="badge">0~1</span></label>
          <input id="nameClusterStrength" type="range" min="0" max="1" step="0.1" value="0.6" />
        </div>
      </div>

      <div class="row">
        <label>分散强度（越大越分散） <span class="badge">建议 0.3~0.8</span></label>
        <input id="spacing" type="range" min="0.1" max="1" step="0.05" value="0.5" />
      </div>

      <div class="action-group">
        <div id="grpTopologyTitle" class="action-group-title">拓扑生成与布局</div>
        <div class="row">
          <button id="build" class="primary">生成拓扑</button>
        </div>
        <div class="row inline">
          <button id="fit">适配画布（慎用）</button>
          <button id="center">居中 + 放大</button>
        </div>
        <div class="row inline">
          <button id="toggleMerge">合并多条链路：开启</button>
          <button id="selectVisible">全选可见节点</button>
        </div>
        <div class="row inline">
          <button id="buildScopedTopo">重排选中设备</button>
        </div>
      </div>

      <div class="action-group">
        <div id="grpViewTitle" class="action-group-title">选中定位与视图过滤</div>
        <div class="row inline">
          <button id="fitSelection">定位选中</button>
          <button id="isolateSelection">仅显示邻接</button>
        </div>
        <div class="row inline">
          <button id="clearSelectionHide">恢复显示</button>
          <button id="show172Only">只显示172设备</button>
        </div>
      </div>

      <div class="action-group">
        <div id="grpDeleteTitle" class="action-group-title">删除恢复与回退</div>
        <div class="row inline">
          <button id="deleteSelection">删除选中</button>
          <button id="keepSelected">删除未选中</button>
        </div>
        <div class="row inline">
          <button id="keepAdjacentOnly">删除非邻接</button>
          <button id="restoreDeleted">恢复删除设备</button>
        </div>
        <div class="row">
          <button id="rollbackStep">回到上一步</button>
        </div>
      </div>
    </div>

    <div class="section-box">
      <h2 id="secExportTitle">导出</h2>
      <div class="row inline">
        <button id="exportPng">导出 PNG</button>
      </div>
      <div class="row inline">
        <button id="exportSession">导出会话</button>
        <button id="importSessionBtn">导入会话</button>
        <input id="importSessionFile" type="file" accept=".json,application/json" style="display:none" />
      </div>
    </div>

    <div class="section-box">
      <h2 id="secUtilTitle">链路利用率</h2>
      <div class="util-grid">
        <div>
          <button id="refreshUtilization" class="primary">CLI 链路利用率</button>
        </div>
        <div>
          <button id="refreshUtilizationZbx" type="button">Zabbix链路利用率</button>
        </div>
        <div>
          <button id="downloadUtilCache" type="button">下载链路缓存CSV</button>
        </div>
        <div>
          <button id="downloadUtilDebug" type="button">下载利用率调试日志</button>
        </div>
        <label class="check-row"><input id="utilDebugEnabled" type="checkbox" />开启调试日志</label>
        <div class="span-2">
          <select id="utilMetric">
            <option value="tx" selected>使用率口径：TX</option>
            <option value="rx">使用率口径：RX</option>
            <option value="max">使用率口径：MAX(TX,RX)</option>
          </select>
        </div>
        <label class="check-row"><input id="utilColorEnabled" type="checkbox" checked />链路颜色映射</label>
        <label class="check-row"><input id="utilLabelEnabled" type="checkbox" checked />显示利用率标签</label>
        <div class="hint span-2" id="utilResultHint">阈值：绿色 &lt; 40%，黄色 40-70%，红色 ≥ 70%。</div>
      </div>
    </div>
  </div>

  <div id="cy"></div>
</div>
<div id="ctxMenu">
  <button id="ctxLock">固定位置</button>
  <button id="ctxDelete">删除设备</button>
  <button id="ctxCopy">复制名称</button>
  <button id="ctxCopyIp">复制地址</button>
  <button id="ctxAppendQuery">追加查询</button>
</div>
<div id="importModal" class="modal-backdrop">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
    <div class="modal-title" id="importModalTitle">导入输入</div>

    <div id="importSqlPanel" class="row">
      <label>设备名称（start_hostname）</label>
      <input id="sqlStartHostnameModal" type="text" placeholder="例如：ID-DCI2-GENERAL.CONNECTION-R003-BRIDGE-02" />
      <div class="modal-actions">
        <button id="runSqlGenerateModal" class="primary">执行 SQL 查询</button>
        <button id="downloadSqlCsvModal">下载临时 CSV</button>
        <button class="closeImportModalBtn">关闭</button>
      </div>
      <div class="hint" id="sqlResultHintModal"></div>
    </div>

    <div id="importCliPanel" class="row hidden">
      <div class="modal-form-grid">
        <div class="field span-2">
          <label>设备地址</label>
          <input id="cliDeviceAddrModal" type="text" placeholder="例如：10.0.0.1 或 hostname" />
        </div>

        <div class="field">
          <label>递归次数（1-5）</label>
          <input id="cliMaxDepthModal" type="number" min="1" max="5" step="1" value="3" />
        </div>
        <div class="field">
          <label>并发查询数（1-16）</label>
          <input id="cliMaxWorkersModal" type="number" min="1" max="16" step="1" value="4" />
        </div>
        <div class="field span-2">
          <label><input id="cliOnly172Modal" type="checkbox" checked style="width:auto; margin-right:8px;" />只递归查询 172.* 网段（跳过 10.* / 143.* 等）</label>
        </div>

        <div class="field">
          <label>设备 SSH 用户名</label>
          <input id="cliUsernameModal" type="text" placeholder="例如：netops" />
        </div>
        <div class="field">
          <label>设备 SSH 密码</label>
          <input id="cliPasswordModal" type="password" placeholder="每次输入，不在本地保存" />
        </div>

        <div class="field">
          <label>SMC 跳板地址</label>
          <input id="cliSmcJumpHostModal" type="text" placeholder="例如：103.115.79.114" />
        </div>
        <div class="field">
          <label>SMC 跳板端口</label>
          <input id="cliSmcJumpPortModal" type="number" min="1" max="65535" step="1" value="22" />
        </div>

        <div class="field span-2">
          <label>SMC 命令</label>
          <input id="cliSmcCommandModal" type="text" value="smc server toc {jump_host}" />
        </div>

        <div class="field">
          <label>登录超时（秒）</label>
          <input id="cliConnectTimeoutModal" type="number" min="5" max="300" step="1" value="60" />
        </div>
        <div class="field">
          <label>命令超时（秒）</label>
          <input id="cliCommandTimeoutModal" type="number" min="5" max="300" step="1" value="45" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="runCliGenerateModal" class="primary">执行 CLI 查询</button>
        <button id="downloadCliCsvModal">导出临时 CSV</button>
        <button id="downloadCliDebugModal">下载 CLI 调试日志</button>
        <button class="closeImportModalBtn">关闭</button>
      </div>
      <div class="hint" id="cliResultHintModal"></div>
    </div>

    <div id="importCsvPanel" class="row hidden">
      <label>CSV 导入（与之前一致）</label>
      <div class="modal-actions">
        <button id="pickCsvModal" class="primary">选择 CSV 文件</button>
        <button id="appendCsvModal">追加 CSV</button>
      </div>
      <label>或直接粘贴 CSV 内容</label>
      <textarea id="pasteModal" class="mono" placeholder='"depth","localhostname","localinterface","remotehostname","remoteinterface"&#10;"1","SW1","Eth1/1","SW2.garena.tw","Eth1/2"'></textarea>
      <div class="modal-actions">
        <button id="loadPasteModal">从粘贴内容载入</button>
        <button class="closeImportModalBtn">关闭</button>
      </div>
    </div>
  </div>
</div>
<div id="cliCredModal" class="modal-backdrop">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="cliCredTitle">
    <div class="modal-title" id="cliCredTitle">请输入 CLI 登录凭据</div>
    <div class="row">
      <label>设备 SSH 用户名</label>
      <input id="cliCredUsername" type="text" placeholder="例如：netops" />
    </div>
    <div class="row">
      <label>设备 SSH 密码</label>
      <input id="cliCredPassword" type="password" placeholder="仅本次页面会话使用，不写入本地存储" />
    </div>
    <div class="modal-actions">
      <button id="cliCredConfirm" class="primary">确认</button>
      <button id="cliCredCancel">取消</button>
    </div>
    <div class="hint" id="cliCredHint"></div>
  </div>
</div>

<script>
  let sourceRows = [];
  let rawRows = [];
  let headers = [];
  let cy = null;
  let deletedStack = [];
  let deletedNodeIds = new Set();
  const viewState = {
    filterTerms: [],
    onlyMode: 'none', // none | showOnly | show172
    onlyTerms: [],
  };
  let degreeMap = new Map();
  let baseEdges = [];
  let mergedMode = true;
  let boxSelectMode = true;
  let cliTimer = null;
  let cliCredResolver = null;
  let nodeIpMap = new Map();
  let deviceNameToIpMap = new Map();
  let lastCliPassword = '';
  let ctxAppendSingleHop = false;
  let utilByKey = new Map();
  let primaryCliSource = '';
  let dragPerfMode = false;
  const NODE_BASE_SIZE = 30;
  const NODE_BASE_FONT_SIZE = 10;
  let lastZoomNodeScale = null;
  let zoomNodeRaf = 0;
  const rollbackState = {
    before: null,
    after: null,
    atBefore: false,
  };
  let rollbackApplyInProgress = false;
  let rollbackArmSeq = 0;
  // 注册 fCoSE 扩展（兼容不同全局名），避免引用未定义导致脚本中断

  function resetViewState() {

  function clearDeleteState() {
    deletedStack = [];

  }

  function rebuildDeletedNodeIdsFromStack() {
    const ids = new Set();
    for (const item of deletedStack) {
      if (!Array.isArray(item)) continue;
      for (const id of item) {
        if (id != null && String(id).trim() !== '') ids.add(String(id));
      }
    }
    deletedNodeIds = ids;
  }

  function pushDeletedNodeIds(ids) {
    const clean = Array.from(new Set((ids || []).map((x) => String(x || '').trim()).filter(Boolean)));
    if (!clean.length) return 0;
    deletedStack.push(clean);
    clean.forEach((id) => deletedNodeIds.add(id));
    return clean.length;
  }

  function cloneRows(rows) {
    return Array.isArray(rows) ? rows.map((r) => ({ ...(r || {}) })) : [];
  }

  function updateRollbackButtonState() {
    const btn = $('rollbackStep');
    if (!btn) return;
    const enabled = !!(rollbackState.before && rollbackState.after);
    btn.disabled = !enabled;
    btn.textContent = rollbackState.atBefore ? tr('rollback_next') : tr('rollback_prev');
  }

  function captureRollbackSnapshot() {
    if (!headers.length && !cy) return null;
    return {
      headers: headers.slice(),
      sourceRows: cloneRows(sourceRows),
      rawRows: cloneRows(rawRows),
      positions: capturePositions(),
      deletedStack: deletedStack.map((x) => (Array.isArray(x) ? x.slice() : [])),
      viewState: {
        filterTerms: Array.isArray(viewState.filterTerms) ? viewState.filterTerms.slice() : [],
        onlyMode: viewState.onlyMode || 'none',
        onlyTerms: Array.isArray(viewState.onlyTerms) ? viewState.onlyTerms.slice() : [],
      },
      ui: {
        filter: $('filter')?.value || '',
        showOnly: $('showOnly')?.value || '',
        layerTerms: $('layerTerms')?.value || '',
        bizIsolationTerms: $('bizIsolationTerms')?.value || '',
        layoutMode: $('layoutMode')?.value || 'layer',
        nodeLabelMode: $('nodeLabelMode')?.value || 'full',
        edgeLabelMode: $('edgeLabelMode')?.value || 'none',
        spacing: $('spacing')?.value || '0.5',
        stripDomain: $('stripDomain')?.value || 'yes',
        nameClusterMode: $('nameClusterMode')?.value || 'on',
        nameClusterStrength: $('nameClusterStrength')?.value || '0.6',
        colLocalHost: $('colLocalHost')?.value || '',
        colRemoteHost: $('colRemoteHost')?.value || '',
        colLocalIf: $('colLocalIf')?.value || '',
        colRemoteIf: $('colRemoteIf')?.value || '',
      },
      mergedMode: !!mergedMode,
      selectedNodeIds: cy ? cy.nodes(':selected').map((n) => n.id()) : [],
    };
  }

  function applyRollbackSnapshot(snapshot) {
    if (!snapshot || !Array.isArray(snapshot.headers)) return false;
    rollbackApplyInProgress = true;
    try {
      headers = snapshot.headers.slice();
      sourceRows = cloneRows(snapshot.sourceRows || []);
      rawRows = cloneRows(snapshot.rawRows || []);
      deletedStack = (snapshot.deletedStack || []).map((x) => (Array.isArray(x) ? x.slice() : []));
      rebuildDeletedNodeIdsFromStack();
      viewState.filterTerms = (snapshot.viewState?.filterTerms || []).slice();
      viewState.onlyMode = snapshot.viewState?.onlyMode || 'none';
      viewState.onlyTerms = (snapshot.viewState?.onlyTerms || []).slice();
      mergedMode = !!snapshot.mergedMode;
      setMergeButtonText();

      if ($('filter')) $('filter').value = snapshot.ui?.filter || '';
      if ($('showOnly')) $('showOnly').value = snapshot.ui?.showOnly || '';
      if ($('layerTerms')) $('layerTerms').value = snapshot.ui?.layerTerms || '';
      if ($('bizIsolationTerms')) $('bizIsolationTerms').value = snapshot.ui?.bizIsolationTerms || '';
      if ($('layoutMode')) $('layoutMode').value = snapshot.ui?.layoutMode || 'layer';
      if ($('nodeLabelMode')) $('nodeLabelMode').value = snapshot.ui?.nodeLabelMode || 'full';
      if ($('edgeLabelMode')) $('edgeLabelMode').value = snapshot.ui?.edgeLabelMode || 'none';
      if ($('spacing')) $('spacing').value = snapshot.ui?.spacing || '0.5';
      if ($('stripDomain')) $('stripDomain').value = snapshot.ui?.stripDomain || 'yes';
      if ($('nameClusterMode')) $('nameClusterMode').value = snapshot.ui?.nameClusterMode || 'on';
      if ($('nameClusterStrength')) $('nameClusterStrength').value = snapshot.ui?.nameClusterStrength || '0.6';

      $('nRows').textContent = rawRows.length;
      $('nCols').textContent = headers.length;

      if (headers.length) {
        fillSelect('colLocalHost', autoPickColumn(['localhostname','local_host','src','from']));
        fillSelect('colRemoteHost', autoPickColumn(['remotehostname','remote_host','dst','to']));
        fillSelect('colLocalIf', autoPickColumn(['localinterface','local_if','src_if','from_if']));
        fillSelect('colRemoteIf', autoPickColumn(['remoteinterface','remote_if','dst_if','to_if']));
        if (snapshot.ui?.colLocalHost && headers.includes(snapshot.ui.colLocalHost)) $('colLocalHost').value = snapshot.ui.colLocalHost;
        if (snapshot.ui?.colRemoteHost && headers.includes(snapshot.ui.colRemoteHost)) $('colRemoteHost').value = snapshot.ui.colRemoteHost;
        if (snapshot.ui?.colLocalIf && headers.includes(snapshot.ui.colLocalIf)) $('colLocalIf').value = snapshot.ui.colLocalIf;
        if (snapshot.ui?.colRemoteIf && headers.includes(snapshot.ui.colRemoteIf)) $('colRemoteIf').value = snapshot.ui.colRemoteIf;
      }

      const pos = snapshot.positions || {};
      buildGraph(pos);
      applyPositions(pos);

      if (Array.isArray(snapshot.selectedNodeIds) && snapshot.selectedNodeIds.length && cy) {
        cy.elements(':selected').unselect();
        snapshot.selectedNodeIds.forEach((id) => {
          const n = cy.getElementById(String(id || ''));
          if (n && n.length) n.select();
        });
      }
      return true;
    } finally {
      rollbackApplyInProgress = false;
    }
  }

  function armRollbackState(beforeSnapshot, delayMs = 0) {
    if (!beforeSnapshot || rollbackApplyInProgress) return;
    const delay = Math.max(0, Number(delayMs) || 0);
    const seq = ++rollbackArmSeq;
    setTimeout(() => {
      if (seq !== rollbackArmSeq) return;
      if (rollbackApplyInProgress) return;
      const afterSnapshot = captureRollbackSnapshot();
      if (!afterSnapshot) return;
      rollbackState.before = beforeSnapshot;
      rollbackState.after = afterSnapshot;
      rollbackState.atBefore = false;
      updateRollbackButtonState();
    }, delay);
  }

  function runWithRollback(work, opts = {}) {
    const beforeSnapshot = captureRollbackSnapshot();
    const result = work();
    armRollbackState(beforeSnapshot, opts.delayMs || 0);
    return result;
  }

  function startCliTimer(prefix) {

    const startedAt = Date.now();
    const tick = () => {

  function stripAfterDot(s) {
    if (typeof s !== 'string') return s;
    const t = s.trim();
    // Keep IPv4 intact even when strip-domain is enabled.
    if (isIpv4(t)) return t;
    const idx = s.indexOf('.');
    return idx >= 0 ? s.slice(0, idx) : s;
  }

  function isIpv4(s) {
    return /^(?:\d{1,3}\.){3}\d{1,3}$/.test(String(s || '').trim());
  }

  function rowValue(row, keys) {
    for (const k of keys) {
      const v = row?.[k];
      if (v != null && String(v).trim() !== '') return String(v).trim();
    }
    return '';
  }

  // ✅ 关键：hash id，避免 hostname 清洗后冲突导致节点叠在一起
  function fnv1a(str) {
    let h = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = (h + (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24)) >>> 0;
    }
    return ('0000000' + h.toString(16)).slice(-8);
  }
  function normalizeEntityName(name) {
    return String(name || '').trim();
  }
  function normalizeUtilInterface(ifname) {
    return String(ifname || '').trim().toLowerCase();
  }
  function entityKeyFromName(name) {
    const s = normalizeEntityName(name);
    return s ? `name:${s.toLowerCase()}` : '';
  }
  function entityKeyFromIp(ip) {
    const s = String(ip || '').trim();
    if (!isIpv4(s)) return '';
    return `ip:${s}`;
  }
  function nodeIdFromEntityKey(entityKey) {
    const k = String(entityKey || '').trim();
    return k ? ('n_' + fnv1a(k)) : '';
  }
  function nodeIdFromLabel(label) {
    const key = entityKeyFromName(label);
    return nodeIdFromEntityKey(key);
  }
  function inferEntityKey(rawLabel, ip) {
    const ipKey = entityKeyFromIp(ip);
    if (ipKey) return ipKey;
    return entityKeyFromName(rawLabel);
  }
  function inferUtilIdentity(deviceNameOrIp, ipHint = '') {
    const ipKey = entityKeyFromIp(ipHint) || entityKeyFromIp(deviceNameOrIp);
    if (ipKey) return ipKey;
    const name = normalizeEntityName(deviceNameOrIp);
    return name ? name.toLowerCase() : '';
  }
  function buildUtilKey(deviceNameOrIp, iface, ipHint = '') {
    const ident = inferUtilIdentity(deviceNameOrIp, ipHint);
    const nif = normalizeUtilInterface(iface);
    return ident && nif ? `${ident}||${nif}` : '';
  }
  function collectCandidateNodeIds(name, ip = '') {
    const ids = new Set();
    const base = normalizeEntityName(name);
    const ipKey = entityKeyFromIp(ip) || entityKeyFromIp(base);
    if (ipKey) ids.add(nodeIdFromEntityKey(ipKey));
    if (base) {
      const n1 = entityKeyFromName(base);
      const n2 = entityKeyFromName(stripAfterDot(base));
      if (n1) ids.add(nodeIdFromEntityKey(n1));
      if (n2) ids.add(nodeIdFromEntityKey(n2));
    }
    ids.delete('');
    return ids;
  }

  function shortLabel(name) {
    const s = String(name || '');
    if (s.length <= 26) return s;
    return s.slice(0, 12) + '…' + s.slice(-10);
  }

  function choosePreferredLabel(existingLabel, incomingLabel, ip = '') {
    const ex = String(existingLabel || '').trim();
    const inb = String(incomingLabel || '').trim();
    if (!ex) return inb;
    if (!inb) return ex;
    const exIsIp = isIpv4(ex);
    const inIsIp = isIpv4(inb);
    if (exIsIp && !inIsIp) return inb;
    if (!exIsIp && inIsIp) return ex;
    if (ip && ex === ip && inb !== ip) return inb;
    return ex.length >= inb.length ? ex : inb;
  }

  function roleOf(hostname) {
    const h = String(hostname || '').toUpperCase();
    if (h.includes('CORE')) return 'CORE';
    if (h.includes('AGGR') || h.includes('AGG')) return 'AGGR';
    if (h.includes('TOR')) return 'TOR';
    return 'OTHER';
  }
  function roleRank(role) {
    return role === 'CORE' ? 0 : role === 'AGGR' ? 1 : role === 'TOR' ? 2 : 3;
  }

  function parseCSV(text) {
    let t = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    if (t.charCodeAt(0) === 0xFEFF) t = t.slice(1);

    const lines = t.split('\n').filter(l => l.trim() !== '');
    if (lines.length === 0) return { headers: [], rows: [] };

    const first = lines[0];
    const commaCnt = (first.match(/,/g) || []).length;
    const tabCnt = (first.match(/\t/g) || []).length;
    const semiCnt = (first.match(/;/g) || []).length;
    const delim = commaCnt ? ',' : (tabCnt ? '\t' : (semiCnt ? ';' : ','));

    function splitLine(line) {
      if (delim === '\t') return line.split('\t').map(x => x.trim().replace(/^"|"$/g, ''));
      const out = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === delim && !inQuotes) {
          out.push(cur); cur = '';
        } else cur += ch;
      }
      out.push(cur);
      return out.map(x => x.trim().replace(/^"|"$/g, ''));
    }

    const hdr = splitLine(lines[0]);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = splitLine(lines[i]);
      if (cols.every(c => c === '')) continue;
      const obj = {};
      hdr.forEach((h, idx) => obj[h] = (cols[idx] ?? '').trim());
      rows.push(obj);
    }
    return { headers: hdr, rows };
  }

  function autoPickColumn(candidates) {
    const lower = headers.map(h => h.toLowerCase());
    for (const cand of candidates) {
      const idx = lower.indexOf(cand.toLowerCase());
      if (idx >= 0) return headers[idx];
    }
    for (const cand of candidates) {
      const idx = lower.findIndex(h => h.includes(cand.toLowerCase()));
      if (idx >= 0) return headers[idx];
    }
    return headers[0] || '';
  }

  function fillSelect(selId, value) {
    const el = $(selId);
    el.innerHTML = '';
    headers.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h;
      opt.textContent = h;
      el.appendChild(opt);
    });
    if (value && headers.includes(value)) el.value = value;
  }

  function capturePositions() {
    if (!cy) return {};
    const pos = {};
    cy.nodes().forEach(n => { pos[n.id()] = { ...n.position() }; });
    return pos;
  }

  function applyPositions(posMap) {
    if (!cy || !posMap) return;
    cy.nodes().forEach(n => {
      const p = posMap[n.id()];
      if (p && isFinite(p.x) && isFinite(p.y)) n.position(p);
    });
    cy.layout({ name: 'preset', fit: false, padding: 30 }).run();
    cy.center(); cy.zoom(1.05);
  }

  function loadDataFromText(text) {
    // 单文本导入（粘贴）会重置数据
    setErr(''); setOK('');
    setStatus('解析中...');
    clearDeleteState();
    resetViewState();
    const parsed = parseCSV(text);
    headers = parsed.headers;
    sourceRows = parsed.rows.slice();
    rawRows = parsed.rows.slice();

    $('nRows').textContent = rawRows.length;
    $('nCols').textContent = headers.length;

    if (!headers.length) {
      setStatus('解析失败：无表头');
      setErr('请确认导入的是 CSV/TSV，且第一行是列名。');
      return;
    }

    fillSelect('colLocalHost', autoPickColumn(['localhostname','local_host','src','from']));
    fillSelect('colRemoteHost', autoPickColumn(['remotehostname','remote_host','dst','to']));
    fillSelect('colLocalIf', autoPickColumn(['localinterface','local_if','src_if','from_if']));
    fillSelect('colRemoteIf', autoPickColumn(['remoteinterface','remote_if','dst_if','to_if']));

    setStatus('已载入');
    setOK(`已载入：${rawRows.length} 行，${headers.length} 列`);
  }

  function mergeParsed(parsed, sourceName) {
    if (!parsed.headers.length) {
      setErr(`文件 ${sourceName} 没有表头，已跳过`);
      return 0;
    }
    if (!headers.length) {
      headers = parsed.headers;
    } else {
      const base = headers.map(h => h.toLowerCase()).join(',');
      const incoming = parsed.headers.map(h => h.toLowerCase()).join(',');
      if (base !== incoming) {
        setErr(`文件 ${sourceName} 表头不一致，已跳过`);
        return 0;
      }
    }
    rawRows.push(...parsed.rows);
    return parsed.rows.length;
  }

  async function loadFiles(files) {
    try {
      setErr(''); setOK('');
      setStatus('读取/解析中...');
      clearDeleteState();
      resetViewState();
      headers = [];
      sourceRows = [];
      rawRows = [];
      let used = 0;
      for (const f of files) {
        const text = await f.text();
        const parsed = parseCSV(text);
        const added = mergeParsed(parsed, f.name);
        if (added) used++;
      }
      sourceRows = rawRows.slice();

      $('nRows').textContent = rawRows.length;
      $('nCols').textContent = headers.length;

      if (!headers.length) {
        setStatus('解析失败：无表头');
        setErr('请确认导入的是 CSV/TSV，且第一行是列名。');
        return;
      }

      fillSelect('colLocalHost', autoPickColumn(['localhostname','local_host','src','from']));
      fillSelect('colRemoteHost', autoPickColumn(['remotehostname','remote_host','dst','to']));
      fillSelect('colLocalIf', autoPickColumn(['localinterface','local_if','src_if','from_if']));
      fillSelect('colRemoteIf', autoPickColumn(['remoteinterface','remote_if','dst_if','to_if']));

      setStatus('已载入');
      setOK(`已载入 ${used} 个文件：${rawRows.length} 行，${headers.length} 列`);
    } catch (e) {
      setStatus('读取失败');
      setErr(String(e && e.stack ? e.stack : e));
    }
  }

  async function appendFiles(files) {
    try {
      if (!files || !files.length) return;
      setErr(''); setOK('');
      setStatus('追加中...');
      let used = 0;
      for (const f of files) {
        const text = await f.text();
        const parsed = parseCSV(text);
        const added = mergeParsed(parsed, f.name);
        if (added) {
          sourceRows.push(...parsed.rows);
          used++;
        }
      }
      $('nRows').textContent = rawRows.length;
      $('nCols').textContent = headers.length;
      if (!headers.length) {
        setStatus('追加失败：无表头');
        setErr('未检测到表头，追加失败。');
        return;
      }
      fillSelect('colLocalHost', autoPickColumn(['localhostname','local_host','src','from']));
      fillSelect('colRemoteHost', autoPickColumn(['remotehostname','remote_host','dst','to']));
      fillSelect('colLocalIf', autoPickColumn(['localinterface','local_if','src_if','from_if']));
      fillSelect('colRemoteIf', autoPickColumn(['remoteinterface','remote_if','dst_if','to_if']));
      setStatus('追加完成');
      setOK(`已追加 ${used} 个文件：总计 ${rawRows.length} 行`);
    } catch (e) {
      setStatus('追加失败');
      setErr(String(e && e.stack ? e.stack : e));
    }
  }

  function spacingParams() {
    const s = parseFloat($('spacing').value) || 0.5; // 0.1-1
    const factor = 0.5 + s * 1.1; // scale ~0.61 - 1.6
    const idealEdgeLength = 120 * factor; // 较短边，贴近互联
    return {
      s,
      nodeRepulsion: 14000 * factor,         // 适中斥力
      idealEdgeLength,                       // 边长随因子变化
      componentSpacing: 140 * factor,        // 组件间隔
      gravity: 0.2 * factor,                 // 更强重力让互联靠近
      padding: 120 * factor,                 // 边缘留白
      overlapPad: 24 * factor                // 碰撞间距
    };
  }

  function buildGraph(keepPositions = null, opts = {}) {
    const forceNodesInput = Array.isArray(opts.forceNodes) ? opts.forceNodes : [];
    if (!rawRows.length && !forceNodesInput.length) { setErr('请先导入 CSV'); return; }

    const colLH = $('colLocalHost').value;
    const colRH = $('colRemoteHost').value;
    const colLI = $('colLocalIf').value;
    const colRI = $('colRemoteIf').value;

    const strip = $('stripDomain').value === 'yes';
    const nodeLabelMode = $('nodeLabelMode').value;
    const edgeMode = $('edgeLabelMode').value;

    const nodes = new Map(); // id -> data
    const edges = [];
    const edgeSet = new Set();
    degreeMap = new Map(); // reset global
    nodeIpMap = new Map();

    let rawEdgeCnt = 0;

    const rows = dedupeRows(rawRows, { colLH, colLI, colRH, colRI });

    // Preserve explicitly scoped nodes (even when no internal edges are found).
    for (const fn of forceNodesInput) {
      const id = String(fn?.id || '').trim();
      if (!id) continue;
      const label = String(fn?.label || fn?.short || id).trim() || id;
      const ip = isIpv4(fn?.ip) ? String(fn.ip).trim() : '';
      const roleRaw = String(fn?.role || '').trim().toUpperCase();
      const role = roleRaw || roleOf(label);
      const rankRaw = Number(fn?.rank);
      const rank = Number.isFinite(rankRaw) ? rankRaw : roleRank(role);
      const entityKey = String(fn?.entityKey || inferEntityKey(label, ip)).trim();
      nodes.set(id, {
        id,
        label,
        short: shortLabel(label),
        role,
        rank,
        ip,
        entityKey
      });
      if (ip) {
        nodeIpMap.set(label, ip);
        nodeIpMap.set(stripAfterDot(label), ip);
      }
    }

    // Build hostname -> management IP map from CSV extended columns.
    for (const r of rows) {
      const lh = String(r[colLH] || '').trim();
      const rh = String(r[colRH] || '').trim();
      const sip = rowValue(r, ['源设备IP', '源设备ip', 'ipaddr', 'sourceip']);
      const rip = rowValue(r, ['目的设备IP', '目的设备ip', 'remoteip']);
      if (lh && sip && isIpv4(sip)) {
        nodeIpMap.set(lh, sip);
        nodeIpMap.set(stripAfterDot(lh), sip);
      }
      if (rh && rip && isIpv4(rip)) {
        nodeIpMap.set(rh, rip);
        nodeIpMap.set(stripAfterDot(rh), rip);
      }
    }

    for (const r of rows) {
      const lhRaw = (r[colLH] || '').trim();
      const rhRaw = (r[colRH] || '').trim();
      const li = (r[colLI] || '').trim();
      const ri = (r[colRI] || '').trim();
      if (!lhRaw || !rhRaw) continue;
      const lh = strip ? stripAfterDot(lhRaw) : lhRaw;
      const rh = strip ? stripAfterDot(rhRaw) : rhRaw;

      const aRole = roleOf(lh);
      const bRole = roleOf(rh);

      const rowSourceIp = rowValue(r, ['源设备IP', '源设备ip', 'ipaddr', 'sourceip']);
      const rowRemoteIp = rowValue(r, ['目的设备IP', '目的设备ip', 'remoteip']);
      const aIp = (isIpv4(rowSourceIp) ? rowSourceIp : '')
        || nodeIpMap.get(lhRaw)
        || nodeIpMap.get(stripAfterDot(lhRaw))
        || nodeIpMap.get(lh)
        || deviceNameToIpMap.get(lhRaw)
        || deviceNameToIpMap.get(stripAfterDot(lhRaw))
        || (isIpv4(lhRaw) ? lhRaw : '');
      const bIp = (isIpv4(rowRemoteIp) ? rowRemoteIp : '')
        || nodeIpMap.get(rhRaw)
        || nodeIpMap.get(stripAfterDot(rhRaw))
        || nodeIpMap.get(rh)
        || deviceNameToIpMap.get(rhRaw)
        || deviceNameToIpMap.get(stripAfterDot(rhRaw))
        || (isIpv4(rhRaw) ? rhRaw : '');

      const aEntityKey = inferEntityKey(lhRaw || lh, aIp);
      const bEntityKey = inferEntityKey(rhRaw || rh, bIp);
      const aId = nodeIdFromEntityKey(aEntityKey);
      const bId = nodeIdFromEntityKey(bEntityKey);
      if (!aId || !bId) continue;

      const aExisting = nodes.get(aId);
      const bExisting = nodes.get(bId);
      const aLabel = choosePreferredLabel(aExisting?.label, lh, aIp);
      const bLabel = choosePreferredLabel(bExisting?.label, rh, bIp);
      nodes.set(aId, { id: aId, label: aLabel, short: shortLabel(aLabel), role: aRole, rank: roleRank(aRole), ip: aIp, entityKey: aEntityKey });
      nodes.set(bId, { id: bId, label: bLabel, short: shortLabel(bLabel), role: bRole, rank: roleRank(bRole), ip: bIp, entityKey: bEntityKey });

      const edgeLabel = `${li} ↔ ${ri}`.trim();
      const liNorm = String(li || '').trim().toLowerCase();
      const utilKey = (!liNorm || liNorm === 'n/a' || liNorm === 'na')
        ? ''
        : buildUtilKey(lhRaw || lh, li, aIp);
      const k1 = `${aId}||${bId}||${edgeLabel}`;
      const k2 = `${bId}||${aId}||${edgeLabel}`;
      rawEdgeCnt++;

      if (edgeSet.has(k1) || edgeSet.has(k2)) continue;
      edgeSet.add(k1);

      edges.push({ data: { id: `e_${edges.length}`, source: aId, target: bId, label: edgeLabel, labelShown: '', utilKey, utilKeys: utilKey ? [utilKey] : [] } });
      degreeMap.set(aId, (degreeMap.get(aId) || 0) + 1);
      degreeMap.set(bId, (degreeMap.get(bId) || 0) + 1);
    }

    $('nNodes').textContent = nodes.size;
    baseEdges = edges.slice(); // 保存原始边
    $('nEdges').textContent = mergedMode ? aggregateEdges(baseEdges).length : baseEdges.length;

    if (nodes.size <= 2 && rawRows.length > 10) {
      setErr('⚠️ 节点数量异常偏少。说明可能存在 hostname 为空/列映射错误。请检查列映射是否正确。');
    } else {
      setErr('');
    }

    const edgesForCy = mergedMode ? aggregateEdges(baseEdges) : baseEdges;
    const elements = [
      ...Array.from(nodes.values()).map(n => ({ data: n })),
      ...edgesForCy
    ];

    if (cy) cy.destroy();

    // ✅ 初始随机位置，或保持已有位置
    const rand = (min, max) => Math.random() * (max - min) + min;
    for (const el of elements) {
      if (el.data && el.data.id && el.data.label !== undefined && !el.data.source) {
        const keep = keepPositions && keepPositions[el.data.id];
        el.position = keep ? { ...keep } : { x: rand(-500, 500), y: rand(-500, 500) };
      }
    }

    cy = cytoscape({
      container: $('cy'),
      elements,
      style: [
        {
          selector: 'node',
          style: {
            'label': nodeLabelMode === 'full' ? 'data(label)' : 'data(short)',
            'font-size': 10,
            'text-outline-width': 2,
            'text-outline-color': '#ffffff',
            'width': 30,
            'height': 30,
            'background-color': '#2563eb',
            'border-width': 0
          }
        },
        { selector: 'node[role = "CORE"]', style: { 'background-color': '#7c3aed' } },
        { selector: 'node[role = "AGGR"]', style: { 'background-color': '#2563eb' } },
        { selector: 'node[role = "TOR"]',  style: { 'background-color': '#059669' } },
        { selector: 'node[role = "OTHER"]',style: { 'background-color': '#6b7280' } },

        {
          selector: 'edge',
          style: {
            'curve-style': 'bezier',
            'target-arrow-shape': 'triangle',
            'arrow-scale': 0.8,
            'width': 1.2,
            'line-color': '#9ca3af',
            'target-arrow-color': '#9ca3af',
            'label': 'data(labelShown)',
            'font-size': 9,
            'text-background-color': '#ffffff',
            'text-background-opacity': 0.85,
            'text-background-padding': 2,
            'text-rotation': 'autorotate',
            'color': '#374151'
          }
        },
        { selector: 'edge.util-low', style: { 'line-color': '#16a34a', 'target-arrow-color': '#16a34a' } },
        { selector: 'edge.util-mid', style: { 'line-color': '#ca8a04', 'target-arrow-color': '#ca8a04' } },
        { selector: 'edge.util-high', style: { 'line-color': '#dc2626', 'target-arrow-color': '#dc2626' } },
        { selector: 'edge.util-na', style: { 'line-style': 'dashed', 'line-color': '#9ca3af', 'target-arrow-color': '#9ca3af' } },
        {
          selector: 'edge.heavy',
          style: {
            'curve-style': 'bezier',
            'target-arrow-shape': 'triangle',
            'line-opacity': 0.75,
            'arrow-scale': 0.65,
            'text-background-opacity': 0.35
          }
        },
        {
          selector: 'edge.drag-lite',
          style: {
            'curve-style': 'haystack',
            'target-arrow-shape': 'none',
            'label': '',
            'text-background-opacity': 0,
            'arrow-scale': 0
          }
        },
        {
          selector: 'node.drag-lite',
          style: {
            'label': ''
          }
        },
        { selector: 'edge.hovered', style: { 'label': 'data(label)' } },

        { selector: '.hit', style: { 'border-width': 2, 'border-color': '#111827' } },
        { selector: '.dim', style: { 'opacity': 0.15 } },
        { selector: '.filtered', style: { 'display': 'none' } },
        { selector: '.onlyHidden', style: { 'display': 'none' } },
        { selector: ':selected', style: {
          'border-width': 3,
          'border-color': '#2563eb',
          'shadow-blur': 14,
          'shadow-color': '#2563eb',
          'shadow-opacity': 0.6,
          'shadow-offset-x': 0,
          'shadow-offset-y': 0
        } }
      ],
      layout: { name: 'preset' },
      wheelSensitivity: 0.22,
      pixelRatio: 1,
      hideEdgesOnViewport: true,
      textureOnViewport: true
    });
    cy.autoungrabify(false);
    cy.autounselectify(false);
    cy.boxSelectionEnabled(boxSelectMode);
    cy.userPanningEnabled(true);
    cy.userZoomingEnabled(true);
    cy.nodes().unlock().grabify();

    const hasKeep = keepPositions && Object.keys(keepPositions).length > 0;

    // 根据分层关键字重新标记角色/层级
    applyLayersToNodes(cy.nodes());

    // 如果保留坐标，则先应用并锁定，布局后再解锁
    if (hasKeep) {
      cy.nodes().forEach(n => {
        const p = keepPositions[n.id()];
        if (p) { n.position(p); n.lock(); }
      });
    }

    // 使节点标签模式与当前选择同步
    updateNodeLabels(nodeLabelMode);
    // 使边标签模式与当前选择同步
    updateEdgeLabels(edgeMode);
    applyUtilizationToEdges();
    applyAdaptiveRenderMode();
    applyZoomAwareNodeSizing(true);

    // click highlight：仅高亮选中节点本身，不再自动高亮邻居
    cy.on('tap', 'node', () => {
      cy.elements().removeClass('hit dim');
      cy.nodes(':selected').addClass('hit');
    });
    cy.on('grab', 'node', () => {
      if (shouldUseDragLiteMode()) setDragPerfMode(true);
    });
    cy.on('free', 'node', () => {
      if (dragPerfMode) setDragPerfMode(false);
    });
    cy.on('tap', (evt) => {
      if (evt.target === cy) cy.elements().removeClass('dim hit');
    });

    // 右键菜单：固定位置 / 删除节点
    cy.on('cxttap', 'node', (evt) => {
      evt.originalEvent.preventDefault();
      showCtx(evt);
    });
    cy.on('tap', () => hideCtx());
    cy.on('pan', () => hideCtx());
    cy.on('zoom', () => {
      hideCtx();
      scheduleZoomAwareNodeSizing();
    });

    reapplyViewStateAfterBuild();
    applyDeletedMaskAfterBuild();
    const adjustViewport = opts.adjustViewport !== false;
    const keepExactPositions = !!opts.keepExactPositions;
    if (hasKeep && keepExactPositions) {
      // Keep current dragged coordinates exactly as-is for scoped rebuild workflows.
      cy.layout({ name: 'preset', fit: false, padding: 30 }).run();
    } else {
      runLayout(null, { adjustViewport });
    }
    if (hasKeep) {
      setTimeout(() => {
        if (cy) cy.nodes().unlock();
      }, 900);
    }
    initDragFollow();

    setStatus('拓扑已生成');
    setOK(`生成完成：${nodes.size} 节点，${edgesForCy.length} 边（去重后${mergedMode ? '，已合并多链路' : ''}）。\n提示：不要频繁点“适配画布”，会把图缩成很小；用“居中 + 放大”更好。`);
  }

  function buildSelectionLayoutBox(nodes, padding = 30) {
    if (!cy || !nodes || !nodes.length) return null;
    const bb = nodes.boundingBox({ includeLabels: false, includeOverlays: false });
    const pad = Math.max(20, Number(padding) || 30);
    const x1 = Number.isFinite(bb.x1) ? (bb.x1 - pad) : 0;
    const y1 = Number.isFinite(bb.y1) ? (bb.y1 - pad) : 0;
    const w = Math.max(280, (Number.isFinite(bb.w) ? bb.w : 0) + pad * 2);
    const h = Math.max(220, (Number.isFinite(bb.h) ? bb.h : 0) + pad * 2);
    return { x1, y1, w, h };
  }

  function runLayout(targetNodes = null, opts = {}) {
    if (!cy) return;
    const selectedOnly = !!opts.selectedOnly;
    const adjustViewport = opts.adjustViewport !== false;
    const source = targetNodes && typeof targetNodes.intersection === 'function'
      ? targetNodes
      : null;
    const visNodes = source && source.length
      ? source.intersection(cy.nodes(':visible'))
      : cy.nodes(':visible');
    if (!visNodes.length) {
      if (selectedOnly) {
        setOK('请先选择可见设备后再重新布局。');
      } else {
        setErr('无可见节点可重新布局，请检查过滤或“只显示”条件。');
      }
      return;
    }
    const layoutBox = selectedOnly ? buildSelectionLayoutBox(visNodes, 30) : null;
    const mode = $('layoutMode').value;
    const p = spacingParams();
    const layerTiers = parseLayers();
    const partitionTiers = selectedOnly ? [] : parseBizIsolation();
    const hasManualSegmentation = layerTiers.length > 0 || partitionTiers.length > 0;
    const effectiveMode = (mode === 'layer' && !hasManualSegmentation) ? 'force' : mode;
    const groupNodes = partitionTiers.length
      ? groupNodesByBizIsolation(visNodes, partitionTiers)
      : [visNodes];
    // 分层在每个分区内独立执行，避免分区影响分层匹配结果。
    groupNodes.forEach((gNodes) => applyLayersToNodes(gNodes, layerTiers));
    const groupBoxes = (groupNodes.length > 1)
      ? buildHorizontalRegionBoxes(groupNodes.length, layoutBox)
      : [layoutBox];
    const groupPlans = groupNodes.map((gNodes, idx) => {
      const bbox = groupBoxes[idx] || layoutBox || null;
      const innerEdges = gNodes.connectedEdges().filter((e) => (
        e.visible()
        && gNodes.contains(e.source())
        && gNodes.contains(e.target())
      ));
      return {
        nodes: gNodes,
        eles: gNodes.union(innerEdges),
        bbox,
      };
    });
    // 圆形模式：简单环形，凸显整体拓扑
    if (effectiveMode === 'circle') {
      groupPlans.forEach((g) => {
        const circleOpt = {
          name: 'circle',
          fit: false,
          padding: p.padding,
          avoidOverlap: true,
          nodeDimensionsIncludeLabels: false,
          spacingFactor: 1.2 + p.s * 0.2
        };
        if (g.bbox) circleOpt.boundingBox = g.bbox;
        g.nodes.layout(circleOpt).run();
      });
      if (adjustViewport) {
        cy.fit(visNodes, { padding: p.padding });
        cy.zoom(1.05);
      }
      return;
    }

    // 上下分层：按分层关键字顺序使用预设坐标，层级高->低
    if (effectiveMode === 'layer') {
      groupPlans.forEach((g) => {
        const pos = buildLayerPositions(g.nodes, { area: g.bbox });
        g.nodes.layout({
          name: 'preset',
          positions: pos,
          fit: false,
          padding: p.padding
        }).run();
      });
      if (adjustViewport) {
        cy.fit(visNodes, { padding: p.padding });
        cy.zoom(1.05);
      }
      return;
    }

    const applyFcose = (eles, mult = 1, bbox = null) => {
      const fcOpt = {
        name: 'fcose',
        quality: 'proof',
        randomize: true,
        animate: true,
        animationDuration: 480,
        fit: false,
        padding: p.padding,
        nodeDimensionsIncludeLabels: false,
        nodeRepulsion: (node) => {
          const deg = degreeMap.get(node.id()) || 0;
          // 度数越高，斥力越小，让邻居更贴近
          const factor = 1 + deg * 0.3;
          return (p.nodeRepulsion * mult) / factor;
        },
        idealEdgeLength: (edge) => {
          const src = cy.getElementById(edge.data('source'));
          const tgt = cy.getElementById(edge.data('target'));
          const srcDeg = degreeMap.get(edge.data('source')) || 0;
          const tgtDeg = degreeMap.get(edge.data('target')) || 0;
          const weight = srcDeg + tgtDeg + 1;
          const base = p.idealEdgeLength * mult;
          const minLen = 80; // 强制最小距离，进一步靠近
          // 直连且互为高阶节点时进一步缩短
          const isHigh = (n) => (n.data('rank') || 0) <= 1 || (degreeMap.get(n.id()) || 0) >= 3;
          const bonus = isHigh(src) && isHigh(tgt) ? 40 : 0;
          const adjust = Math.min(base * 0.9, weight * 22 + bonus);
          return Math.max(minLen, base - adjust);
        },
        edgeElasticity: 0.8, // 更强边弹性，拉近互联
        nestingFactor: 0.9,
        gravity: p.gravity,
        gravityRange: 2.8,
        gravityCompound: 1.2,
        gravityRangeCompound: 2.5,
        tile: true,
        packComponents: true,
        nodeSeparation: p.overlapPad
      };
      if (bbox) fcOpt.boundingBox = bbox;
      eles.layout(fcOpt).run();
    };

    // 默认/force：连续两轮 fCoSE，偏向聚拢
    setTimeout(() => {
      if (!cy) return;
      groupPlans.forEach((g) => applyFcose(g.eles, 0.95, g.bbox));
      setTimeout(() => {
        if (!cy) return;
        groupPlans.forEach((g) => applyFcose(g.eles, 1.05, g.bbox));
        setTimeout(() => {
          if (!cy) return;
          if (adjustViewport) {
            cy.fit(visNodes, { padding: p.padding });
            cy.zoom(1.1);
          }
        }, 420);
      }, 520);
    }, 80);
  }

  function parseTerms(raw) {
    return String(raw || '')
      .split(/[,\uff0c;\uff1b]+/g)
      .map(t => t.trim().toLowerCase())
      .filter(Boolean);
  }

  function parseTierExpression(raw) {
    return String(raw || '')
      .split(/[,\uff0c]+/g)
      .map(seg => seg.trim())
      .filter(Boolean)
      .map(seg => {
        // "/" = 同组 OR；"&" = AND 都需命中
        const clauses = seg.split(/[\/\uff0f]/g)
          .map(part => part.trim())
          .filter(Boolean)
          .map(part => part.split(/[&\uff06]/g)
            .map(t => t.trim().toLowerCase())
            .filter(Boolean)
          )
          .filter(arr => arr.length);
        return clauses;
      })
      .filter(arr => arr.length);
  }

  function compactMatchText(v) {
    return String(v || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '');
  }

  function matchTermInName(nameText, termText) {
    const name = String(nameText || '').toLowerCase();
    const term = String(termText || '').toLowerCase().trim();
    if (!term) return false;
    if (name.includes(term)) return true;
    const cName = compactMatchText(name);
    const cTerm = compactMatchText(term);
    if (!cTerm) return false;
    return cName.includes(cTerm);
  }

  function matchTierIndex(nameText, tiers) {
    for (let i = 0; i < tiers.length; i++) {
      const tier = tiers[i];
      const hit = tier.some(clause => clause.every(term => matchTermInName(nameText, term)));
      if (hit) return i;
    }
    return -1;
  }

  function parseLayers() {
    const raw = $('layerTerms').value || '';
    return parseTierExpression(raw);
  }

  function parseBizIsolation() {
    const raw = $('bizIsolationTerms')?.value || '';
    return parseTierExpression(raw);
  }

  function groupNodesByBizIsolation(nodes, tiers) {
    if (!cy) return [nodes];
    nodes.forEach((n) => n.data('bizRegion', 0));
    if (!tiers.length) return [nodes];

    // First-match wins: once a node enters one partition,
    // it will no longer be checked against later partitions.
    const groups = [];
    let remaining = nodes;
    for (let i = 0; i < tiers.length; i++) {
      const tier = tiers[i];
      const hit = remaining.filter((n) => (
        tier.some((clause) => clause.every((term) => matchTermInName(n.data('label') || '', term)))
      ));
      if (!hit.length) continue;
      hit.forEach((n) => n.data('bizRegion', i));
      groups.push(hit);
      remaining = remaining.not(hit);
      if (!remaining.length) break;
    }

    if (remaining.length) {
      remaining.forEach((n) => n.data('bizRegion', tiers.length));
      groups.push(remaining);
    }
    return groups.length ? groups : [nodes];
  }

  function ensureRegionSpacing(boxes, minGap = 18) {
    if (!Array.isArray(boxes) || boxes.length < 2) return boxes;
    const out = boxes.map((b) => ({ ...b }));
    for (let pass = 0; pass < 6; pass++) {
      let moved = false;
      for (let i = 0; i < out.length; i++) {
        for (let j = i + 1; j < out.length; j++) {
          const a = out[i];
          const b = out[j];
          const aRight = a.x1 + a.w;
          const bRight = b.x1 + b.w;
          const aBottom = a.y1 + a.h;
          const bBottom = b.y1 + b.h;
          const gapX = Math.max(0, Math.max(a.x1, b.x1) - Math.min(aRight, bRight));
          const gapY = Math.max(0, Math.max(a.y1, b.y1) - Math.min(aBottom, bBottom));
          if (gapX >= minGap || gapY >= minGap) continue;
          const needX = minGap - gapX;
          const needY = minGap - gapY;
          if (needX >= needY) {
            if (a.x1 <= b.x1) b.x1 += needX;
            else a.x1 += needX;
          } else if (a.y1 <= b.y1) {
            b.y1 += needY;
          } else {
            a.y1 += needY;
          }
          moved = true;
        }
      }
      if (!moved) break;
    }
    return out;
  }

  function buildHorizontalRegionBoxes(count, area = null) {
    if (count <= 0) return [];
    const useArea = !!(area && Number.isFinite(area.x1) && Number.isFinite(area.y1) && Number.isFinite(area.w) && Number.isFinite(area.h));
    const baseX = useArea ? area.x1 : 0;
    const baseY = useArea ? area.y1 : 0;
    const totalW = useArea ? Math.max(320, area.w) : ($('cy').clientWidth || 1000);
    const totalH = useArea ? Math.max(260, area.h) : ($('cy').clientHeight || 800);
    const padX = 32;
    const padY = 28;
    const gapX = useArea ? 44 : 56;
    const gapY = useArea ? 38 : 52;

    let best = null;
    for (let cols = 1; cols <= count; cols++) {
      const rows = Math.ceil(count / cols);
      const slotW = (totalW - padX * 2 - gapX * Math.max(0, cols - 1)) / cols;
      const slotH = (totalH - padY * 2 - gapY * Math.max(0, rows - 1)) / rows;
      if (slotW < 120 || slotH < 120) continue;
      const shapePenalty = Math.abs(cols - rows) * 12;
      const score = Math.min(slotW, slotH) - shapePenalty;
      if (!best || score > best.score) best = { cols, rows, slotW, slotH, score };
    }
    if (!best) {
      best = {
        cols: Math.min(count, 2),
        rows: Math.ceil(count / Math.min(count, 2)),
        slotW: Math.max(120, (totalW - padX * 2) / Math.max(1, Math.min(count, 2))),
        slotH: Math.max(120, (totalH - padY * 2) / Math.max(1, Math.ceil(count / Math.min(count, 2)))),
      };
    }

    const boxes = [];
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / best.cols);
      const col = i % best.cols;
      boxes.push({
        x1: baseX + padX + col * (best.slotW + gapX),
        y1: baseY + padY + row * (best.slotH + gapY),
        w: Math.max(120, best.slotW),
        h: Math.max(120, best.slotH),
      });
    }
    return ensureRegionSpacing(boxes, Math.max(18, Math.floor(Math.min(gapX, gapY) * 0.45)));
  }

  function applyLayersToNodes(nodes, tiersInput = null) {
    // tiers: array<layer>, layer = array<clause>, clause = array<terms that all must match>
    const tiers = Array.isArray(tiersInput) ? tiersInput : parseLayers();
    const layerCount = tiers.length;
    const hasLayers = layerCount > 0;
    nodes.forEach(n => {
      const name = (n.data('label') || '');
      let matchedIdx = null;
      let matchedRole = null;
      if (hasLayers) {
        for (let i = 0; i < tiers.length; i++) {
          const layer = tiers[i];
          const hit = layer.some(clause => clause.every(term => matchTermInName(name, term)));
          if (hit) {
            matchedIdx = i;
            // role 取该层第一个子句的首词，便于显示
            const roleWord = layer[0]?.[0] || '';
            matchedRole = roleWord.toUpperCase();
            break;
          }
        }
      }
      if (matchedIdx !== null) {
        n.data('role', matchedRole);
        n.data('rank', matchedIdx);
      } else {
        // 未命中放最下层；如果没自定义层级则用默认角色层级
        n.data('rank', layerCount ? layerCount : roleRank(roleOf(n.data('label'))));
      }
    });
  }

  function clamp01(v) {
    const n = Number(v);
    if (!Number.isFinite(n)) return 0;
    return Math.max(0, Math.min(1, n));
  }

  function normalizedNameForSimilarity(raw) {
    const s = stripAfterDot(String(raw || '').trim()).toLowerCase();
    return s.replace(/[^a-z0-9]+/g, ' ').trim();
  }

  function tokenizeNameForSimilarity(raw) {
    const s = normalizedNameForSimilarity(raw);
    if (!s) return [];
    return s.split(/\s+/).filter(Boolean);
  }

  function commonPrefixLength(a, b) {
    const aa = String(a || '');
    const bb = String(b || '');
    const max = Math.min(aa.length, bb.length);
    let i = 0;
    while (i < max && aa.charCodeAt(i) === bb.charCodeAt(i)) i++;
    return i;
  }

  function hostnameSimilarityScore(aRaw, bRaw) {
    const a = normalizedNameForSimilarity(aRaw);
    const b = normalizedNameForSimilarity(bRaw);
    if (!a || !b) return 0;
    if (a === b) return 1;

    const aTokens = tokenizeNameForSimilarity(a);
    const bTokens = tokenizeNameForSimilarity(b);
    const aSet = new Set(aTokens);
    const bSet = new Set(bTokens);
    let inter = 0;
    aSet.forEach((t) => { if (bSet.has(t)) inter += 1; });
    const union = new Set([...aSet, ...bSet]).size || 1;
    const tokenScore = inter / union;

    const prefix = commonPrefixLength(a, b);
    const prefixScore = prefix / Math.max(a.length, b.length, 1);
    const firstTokenBonus = (aTokens[0] && bTokens[0] && aTokens[0] === bTokens[0]) ? 0.12 : 0;
    return clamp01(tokenScore * 0.6 + prefixScore * 0.4 + firstTokenBonus);
  }

  function labelByIdForOrdering(nameById, id) {
    return String(nameById.get(id) || id).toLowerCase();
  }

  function orderLayerIdsByNameSimilarity(ids, nameById) {
    const sorted = ids.slice().sort((a, b) => labelByIdForOrdering(nameById, a).localeCompare(labelByIdForOrdering(nameById, b)));
    if (sorted.length <= 2) return sorted;

    let seed = sorted[0];
    let seedScore = -1;
    for (const c of sorted) {
      let total = 0;
      for (const other of sorted) {
        if (c === other) continue;
        total += hostnameSimilarityScore(nameById.get(c), nameById.get(other));
      }
      if (total > seedScore || (total === seedScore && labelByIdForOrdering(nameById, c) < labelByIdForOrdering(nameById, seed))) {
        seed = c;
        seedScore = total;
      }
    }

    const remaining = new Set(sorted);
    remaining.delete(seed);
    const ordered = [seed];
    while (remaining.size) {
      let bestId = '';
      let bestSide = 'right';
      let bestScore = -1;
      let bestLabel = '';
      for (const c of remaining) {
        const leftScore = hostnameSimilarityScore(nameById.get(c), nameById.get(ordered[0]));
        const rightScore = hostnameSimilarityScore(nameById.get(c), nameById.get(ordered[ordered.length - 1]));
        const score = Math.max(leftScore, rightScore);
        const side = leftScore > rightScore ? 'left' : 'right';
        const candLabel = labelByIdForOrdering(nameById, c);
        if (score > bestScore || (score === bestScore && candLabel < bestLabel)) {
          bestId = c;
          bestSide = side;
          bestScore = score;
          bestLabel = candLabel;
        }
      }
      if (!bestId) break;
      remaining.delete(bestId);
      if (bestSide === 'left') ordered.unshift(bestId);
      else ordered.push(bestId);
    }
    return ordered;
  }

  function buildSimilarityGaps(orderedIds, nameById, baseGap, minGap, strength) {
    const out = [];
    const flex = Math.max(0, baseGap - minGap);
    for (let i = 0; i < orderedIds.length - 1; i++) {
      const a = orderedIds[i];
      const b = orderedIds[i + 1];
      const sim = hostnameSimilarityScore(nameById.get(a), nameById.get(b));
      // Similar names are pulled closer while preserving minimum spacing.
      const gap = minGap + flex * (1 - strength * sim);
      out.push(Math.max(minGap, gap));
    }
    return out;
  }

  function buildLayerPositions(nodes, opts = {}) {
    const ranks = new Map();
    const nameById = new Map();
    nodes.forEach(n => {
      const r = n.data('rank') ?? 0;
      if (!ranks.has(r)) ranks.set(r, []);
      ranks.get(r).push(n.id());
      nameById.set(n.id(), n.data('label') || n.id());
    });
    const sortedRanks = Array.from(ranks.keys()).sort((a, b) => a - b);
    const positions = {};
    const area = (opts && opts.area) ? opts.area : null;
    const useArea = !!(area && Number.isFinite(area.x1) && Number.isFinite(area.y1) && Number.isFinite(area.w) && Number.isFinite(area.h));
    const width = useArea ? Math.max(280, area.w) : ($('cy').clientWidth || 1000);
    const height = useArea ? Math.max(220, area.h) : ($('cy').clientHeight || 800);
    const offsetX = useArea ? area.x1 : 0;
    const offsetY = useArea ? area.y1 : 0;
    const clusterMode = ($('nameClusterMode')?.value || 'on');
    const clusterOn = clusterMode !== 'off';
    const clusterStrength = clamp01($('nameClusterStrength')?.value || 0.6);
    const sidePad = useArea ? 26 : 70;
    const topPad = useArea ? 24 : 80;
    const bottomPad = useArea ? 24 : 80;
    const usableW = Math.max(80, width - sidePad * 2);
    const usableH = Math.max(60, height - topPad - bottomPad);
    const layerGap = sortedRanks.length <= 1
      ? 0
      : (useArea
        ? (usableH / Math.max(1, sortedRanks.length - 1))
        : Math.max(140, height / Math.max(1, sortedRanks.length + 1)));
    sortedRanks.forEach((r, layerIdx) => {
      const rawIds = ranks.get(r);
      const ids = clusterOn ? orderLayerIdsByNameSimilarity(rawIds, nameById) : rawIds.slice();
      const count = ids.length;
      const y = sortedRanks.length <= 1
        ? (offsetY + Math.max(topPad, height / 2))
        : (offsetY + topPad + layerIdx * layerGap);
      if (count <= 0) return;
      if (count === 1) {
        positions[ids[0]] = { x: offsetX + sidePad + usableW / 2, y };
        return;
      }
      const minGap = useArea
        ? Math.max(20, Math.min(56, usableW / Math.max(2, count * 2)))
        : 120;
      const baseGap = useArea
        ? (usableW / Math.max(1, count - 1))
        : Math.max(minGap, width / Math.max(1, count));
      if (!clusterOn || clusterStrength <= 0) {
        const xGap = usableW / Math.max(1, count - 1);
        ids.forEach((id, idx) => {
          positions[id] = { x: offsetX + sidePad + xGap * idx, y };
        });
        return;
      }

      const gaps = buildSimilarityGaps(ids, nameById, baseGap, minGap, clusterStrength);
      let span = gaps.reduce((sum, g) => sum + g, 0);
      if (span > usableW && span > 0) {
        const scale = usableW / span;
        for (let i = 0; i < gaps.length; i++) gaps[i] = Math.max(12, gaps[i] * scale);
        span = gaps.reduce((sum, g) => sum + g, 0);
      }
      let x = offsetX + sidePad + Math.max(0, (usableW - span) / 2);
      positions[ids[0]] = { x, y };
      for (let i = 1; i < ids.length; i++) {
        x += gaps[i - 1];
        positions[ids[i]] = { x, y };
      }
    });
    return positions;
  }

  function isolateSelection() {
    if (!cy) return;
    cy.elements().removeClass('sel-hidden dim hit');
    const sel = cy.nodes(':selected');
    if (!sel.length) {
      setOK('未选择节点，保持全部显示。');
      return;
    }
    const neigh = sel.closedNeighborhood(); // 包含自身和邻居、边
    cy.elements().addClass('dim');
    neigh.removeClass('dim');
    sel.addClass('hit');
    setOK(`已凸显选中及邻接节点：${sel.length} 个选中节点。`);
  }

  function keepAdjacentOnly() {
    if (!cy) return;
    cy.elements().removeClass('sel-hidden dim hit');
    const sel = cy.nodes(':selected');
    if (!sel.length) {
      setOK('未选中节点，无法删除非邻接。');
      return;
    }
    const neigh = sel.closedNeighborhood();
    const removeNodes = cy.nodes().difference(neigh.nodes());
    if (!removeNodes.length) {
      setOK('当前已全部是邻接范围，无需删除。');
      return;
    }
    const ids = removeNodes.map(n => n.id());
    pushDeletedNodeIds(ids);
    removeNodes.remove();
    updateCounts();
    sel.addClass('hit');
    setOK(`已删除非邻接节点：${removeNodes.length} 个（可恢复）。`);
  }

  function hostValueFromRow(row, keys) {
    for (const k of keys) {
      const v = row?.[k];
      if (v != null && String(v).trim() !== '') return String(v).trim();
    }
    return '';
  }

  function releaseNodesFromDeletedStack(nodeIds) {
    if (!nodeIds || !nodeIds.size || !deletedStack.length) return;
    const kept = [];
    for (const item of deletedStack) {
      if (!Array.isArray(item)) continue;
      const filtered = item.filter((id) => !nodeIds.has(String(id || '')));
      if (filtered.length) kept.push(filtered);
    }
    deletedStack = kept;
    rebuildDeletedNodeIdsFromStack();
  }

  function dedupeRows(rows, cols = {}) {
    const lhKey = cols.colLH || 'localhostname';
    const liKey = cols.colLI || 'localinterface';
    const rhKey = cols.colRH || 'remotehostname';
    const riKey = cols.colRI || 'remoteinterface';
    const seen = new Set();
    const out = [];
    const normIf = (v) => {
      const s = String(v || '').trim();
      return s || 'N/A';
    };
    for (const r of rows) {
      const lh = String(r[lhKey] || r.localhostname || '').trim();
      const li = normIf(r[liKey] || r.localinterface || '');
      const rh = String(r[rhKey] || r.remotehostname || '').trim();
      const ri = normIf(r[riKey] || r.remoteinterface || '');
      if (!lh || !rh) continue;
      const key = [lh, li, rh, ri].map(s => s.toLowerCase()).join('||');
      if (seen.has(key)) continue;
      seen.add(key);
      out.push({ ...r, [lhKey]: lh, [liKey]: li, [rhKey]: rh, [riKey]: ri, localhostname: lh, localinterface: li, remotehostname: rh, remoteinterface: ri });
    }
    return out;
  }

  // 将同一对节点的多条边合并为单条
  function aggregateEdges(edges) {
    const bucket = new Map();
    edges.forEach((e) => {
      const s = e.data.source;
      const t = e.data.target;
      const key = s < t ? `${s}||${t}` : `${t}||${s}`;
      if (!bucket.has(key)) bucket.set(key, []);
      bucket.get(key).push(e);
    });
    const merged = [];
    let idx = 0;
    bucket.forEach((list, key) => {
      const [a, b] = key.split('||');
      const count = list.length;
      const labels = list.map(x => x.data.label).filter(Boolean);
      const label = count > 1 ? `${count} 条链路` : (labels[0] || '');
      const utilKeys = Array.from(new Set(list.flatMap(x => Array.isArray(x.data.utilKeys) ? x.data.utilKeys : (x.data.utilKey ? [x.data.utilKey] : []))));
      merged.push({ data: { id: `m_${idx++}`, source: a, target: b, label, labelShown: '', utilKeys } });
    });
    return merged;
  }

  function normalizeRows(rows) {
    return rows.map((row) => {
      if (Array.isArray(row)) {
        // array row -> map by default headers
        const keys = ['depth','localhostname','localinterface','remotehostname','remoteinterface'];
        const obj = {};
        keys.forEach((k, idx) => obj[k] = row[idx] || '');
        return obj;
      }
      if (row && typeof row === 'object') {
        const obj = {};
        Object.entries(row).forEach(([k, v]) => {
          const key = (k || '').toString().toLowerCase();
          obj[key] = v == null ? '' : v;
        });
        return obj;
      }
      return {};
    });
  }

  function nodeScaleByZoom(zoom) {
    const z = Number(zoom);
    if (!Number.isFinite(z) || z <= 1) return 1;
    // Zoom-in keeps nodes readable but less intrusive in dense graphs.
    return Math.max(0.18, Math.min(1, 1 / Math.pow(z, 1.2)));
  }

  function applyZoomAwareNodeSizing(force = false) {
    if (!cy) return;
    const scale = nodeScaleByZoom(cy.zoom());
    if (!force && lastZoomNodeScale !== null && Math.abs(scale - lastZoomNodeScale) < 0.02) return;
    lastZoomNodeScale = scale;
    const nodeSize = Math.max(6, NODE_BASE_SIZE * scale);
    const fontSize = Math.max(6, NODE_BASE_FONT_SIZE * scale);
    cy.batch(() => {
      cy.nodes().style({
        'width': nodeSize,
        'height': nodeSize,
        'font-size': fontSize
      });
    });
  }

  function scheduleZoomAwareNodeSizing(force = false) {
    if (!cy) return;
    if (force) {
      if (zoomNodeRaf) {
        cancelAnimationFrame(zoomNodeRaf);
        zoomNodeRaf = 0;
      }
      applyZoomAwareNodeSizing(true);
      return;
    }
    if (zoomNodeRaf) return;
    zoomNodeRaf = requestAnimationFrame(() => {
      zoomNodeRaf = 0;
      applyZoomAwareNodeSizing(false);
    });
  }

  function applyAdaptiveRenderMode() {
    if (!cy) return;
    const heavy = shouldUseHeavyEdgeMode();
    cy.batch(() => {
      if (heavy) cy.edges().addClass('heavy');
      else cy.edges().removeClass('heavy');
    });

  function setDragPerfMode(enabled) {
    if (!cy) return;
    if (enabled === dragPerfMode) return;
    dragPerfMode = enabled;
    cy.batch(() => {
      if (enabled) {
        cy.edges().addClass('drag-lite');
        cy.nodes().addClass('drag-lite');

  function edgeUtilFromKeys(edge) {
    const metric = (($('utilMetric')?.value || 'tx').trim().toLowerCase());
    const pickPct = (entry) => {
      if (!entry || typeof entry !== 'object') return null;
      const tx = (typeof entry.tx_pct === 'number') ? entry.tx_pct : null;
      const rx = (typeof entry.rx_pct === 'number') ? entry.rx_pct : null;
      if (metric === 'rx') return rx;
      if (metric === 'max') {
        const cands = [tx, rx].filter(v => typeof v === 'number');
        return cands.length ? Math.max(...cands) : null;
      }
      if (typeof tx === 'number') return tx;
      return (typeof entry.used_pct === 'number') ? entry.used_pct : null;
    };
    const keys = edge.data('utilKeys');
    const arr = Array.isArray(keys) ? keys : [];
    const values = arr
      .map(k => utilByKey.get(String(k || '').toLowerCase()))
      .map(v => pickPct(v))
      .filter(v => typeof v === 'number');
    if (!values.length) return null;
    return Math.max(...values);
  }

  function applyUtilizationToEdges() {
    if (!cy) return;
    const enableColor = !!$('utilColorEnabled')?.checked;
    cy.edges().forEach((e) => {
      const pct = edgeUtilFromKeys(e);
      e.removeClass('util-low util-mid util-high util-na');
      if (pct == null) {
        e.data('utilText', 'U:N/A');
        if (enableColor) e.addClass('util-na');
      } else {
        e.data('utilText', `U:${pct.toFixed(1)}%`);
        if (enableColor) {
          if (pct >= 70) e.addClass('util-high');
          else if (pct >= 40) e.addClass('util-mid');
          else e.addClass('util-low');
        }
      }
    });
    refreshEdgeLabelDisplay();
  }

  function applySessionSnapshot(snapshot) {
    const hs = Array.isArray(snapshot?.headers) ? snapshot.headers : [];
    const srcRows = Array.isArray(snapshot?.source_rows) ? snapshot.source_rows : [];
    const workRows = Array.isArray(snapshot?.working_rows) ? snapshot.working_rows : [];
    const rs = workRows.length ? workRows : (Array.isArray(snapshot?.rows) ? snapshot.rows : []);
    if (!hs.length || !rs.length) {
      throw new Error('会话文件缺少有效的表头或数据行');
    }

    headers = hs.slice();
    sourceRows = (srcRows.length ? srcRows : rs).slice();

    if (ui.colLocalIf && headers.includes(ui.colLocalIf)) $('colLocalIf').value = ui.colLocalIf;
    if (ui.colRemoteIf && headers.includes(ui.colRemoteIf)) $('colRemoteIf').value = ui.colRemoteIf;

    const pos = (snapshot?.positions && typeof snapshot.positions === 'object') ? snapshot.positions : {};
    buildGraph(pos);
    applyPositions(pos);
  }

  }

  let lastSqlDownloadUrl = '';

  const CLI_PREF_KEY = 'lldp_cli_import_prefs_v1';

  function apiBaseUrl() {
    // If opened as file://, use local service endpoint explicitly.
    if (window.location.protocol === 'file:') return 'http://127.0.0.1:18080';
