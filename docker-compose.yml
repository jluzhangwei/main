version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netops-ai-backend
    environment:
      HOME: /data
      NETOPS_ENVIRONMENT: docker
      NETOPS_POSTGRES_DSN: postgresql+asyncpg://netops:netops@postgres:5432/netops
      NETOPS_REDIS_URL: redis://redis:6379/0
    volumes:
      - netops_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netops-ai-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  netops_data:
