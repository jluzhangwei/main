version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: netops
      POSTGRES_PASSWORD: netops
      POSTGRES_DB: netops
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      NETOPS_POSTGRES_DSN: postgresql+asyncpg://netops:netops@postgres:5432/netops
      NETOPS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
