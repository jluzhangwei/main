version: 2
description: "Huawei + Cisco + Arista command intent mapping by platform/model/software version"

intents:
  - version
  - uptime
  - cpu_usage
  - memory_usage
  - interface_brief
  - interface_errors
  - transceiver
  - route_summary
  - arp_table
  - mac_table
  - lldp_neighbors
  - bgp_summary
  - ospf_summary
  - ntp_status
  - log_recent
  - alarm_active
  - environmental
  - power_status
  - fan_status
  - spanning_tree
  - acl_summary
  - running_config

profiles:
