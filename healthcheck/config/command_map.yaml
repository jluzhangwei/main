  # Huawei
  # ----------------------------
  - id: huawei.ne40e.v8
    vendor: huawei
    match:
      any:
        - regex: "(?i)HUAWEI\\s+NE40E"
        - regex: "(?i)NE40E.*V800R"
    commands:
      version:
        - "display version"
      uptime:
        - "display version"
      cpu_usage:
        - "display cpu-usage"
        - "display cpu"
      memory_usage:
        - "display memory-usage"
        - "display memory"
      interface_brief:
        - "display ip interface brief"
      route_summary:
        - "display ip routing-table summary"
        - "display ip routing-table"
      running_config:
        - "display current-configuration | no-more"

  - id: huawei.s57xx.v200r019
