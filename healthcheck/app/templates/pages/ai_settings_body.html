<div class="wrap">
  <div class="card ai-card">
    <div class="ai-head">
      <span id="provider_brand_inline" class="ai-brand"></span>
      <h2>{{AI_ANALYSIS_SETTINGS_TITLE}}</h2>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">{{LLM_CONFIG_TITLE}}</div>
      <div class="ai-grid">
        <div>
          <label>{{PROVIDER_LABEL}}</label>
          <select id="provider_select">
            <option value="chatgpt" {{PROVIDER_CHATGPT_SELECTED}}>ChatGPT</option>
            <option value="deepseek" {{PROVIDER_DEEPSEEK_SELECTED}}>DeepSeek</option>
            <option value="gemini" {{PROVIDER_GEMINI_SELECTED}}>Gemini</option>
            <option value="nvidia" {{PROVIDER_NVIDIA_SELECTED}}>NVIDIA</option>
            <option value="local" {{PROVIDER_LOCAL_SELECTED}}>{{LOCAL_MODEL_OPTION_LABEL}}</option>
          </select>
          <div id="llm_test_result" class="hint">{{LLM_TEST_HINT}}</div>
        </div>
        <div>
          <label>{{API_KEY_MGMT_LABEL}}</label>
          <div class="actions" style="margin-top:0;">
            <button class="btn" id="import_api_key_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{IMPORT_API_KEY_TEXT}}</button>
            <button class="btn" id="test_llm_btn" type="button">{{MODEL_CONNECTION_TEST_TEXT}}</button>
            <button class="btn" id="save_llm_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{SAVE_CONFIG_TEXT}}</button>
          </div>
          <div class="hint">{{CONFIG_USAGE_HINT}}</div>
          <div id="api_key_state" class="hint"></div>
        </div>
      </div>

      <div id="chatgpt_settings" class="ai-grid ai-row" {{CHATGPT_SETTINGS_STYLE}}>
        <div>
          <label>ChatGPT {{MODEL_LABEL}}</label>
          <select id="chatgpt_model_select">{{CHATGPT_MODEL_OPTIONS}}</select>
        </div>
        <div id="chatgpt_custom_wrap" {{CHATGPT_CUSTOM_STYLE}}>
          <label>{{CUSTOM_CHATGPT_MODEL_LABEL}}</label>
          <input id="chatgpt_model_custom" value="{{CHATGPT_CUSTOM_VALUE}}" placeholder="gpt-4.1-mini">
        </div>
      </div>

      <div id="deepseek_settings" class="ai-grid ai-row" {{DEEPSEEK_SETTINGS_STYLE}}>
        <div>
          <label>DeepSeek {{MODEL_LABEL}}</label>
          <select id="deepseek_model_select">{{DEEPSEEK_MODEL_OPTIONS}}</select>
        </div>
        <div id="deepseek_custom_wrap" {{DEEPSEEK_CUSTOM_STYLE}}>
          <label>{{CUSTOM_DEEPSEEK_MODEL_LABEL}}</label>
          <input id="deepseek_model_custom" value="{{DEEPSEEK_CUSTOM_VALUE}}" placeholder="deepseek-chat">
        </div>
      </div>

      <div id="gemini_settings" class="ai-grid ai-row" {{GEMINI_SETTINGS_STYLE}}>
        <div>
          <label>Gemini {{MODEL_LABEL}}</label>
          <select id="gemini_model_select">{{GEMINI_MODEL_OPTIONS}}</select>
        </div>
        <div id="gemini_custom_wrap" {{GEMINI_CUSTOM_STYLE}}>
          <label>{{CUSTOM_GEMINI_MODEL_LABEL}}</label>
          <input id="gemini_model_custom" value="{{GEMINI_CUSTOM_VALUE}}" placeholder="gemini-2.0-flash">
        </div>
      </div>

      <div id="nvidia_settings" class="ai-grid ai-row" {{NVIDIA_SETTINGS_STYLE}}>
        <div>
          <label>NVIDIA {{MODEL_LABEL}}</label>
          <select id="nvidia_model_select">{{NVIDIA_MODEL_OPTIONS}}</select>
        </div>
        <div id="nvidia_custom_wrap" {{NVIDIA_CUSTOM_STYLE}}>
          <label>{{CUSTOM_NVIDIA_MODEL_LABEL}}</label>
          <input id="nvidia_model_custom" value="{{NVIDIA_CUSTOM_VALUE}}" placeholder="meta/llama-3.1-405b-instruct">
        </div>
      </div>

      <div id="local_settings" class="ai-grid ai-row" {{LOCAL_SETTINGS_STYLE}}>
        <div>
          <label>{{LOCAL_ENDPOINT_LABEL}}</label>
          <input id="local_base_url" value="{{LOCAL_BASE_URL}}" placeholder="http://127.0.0.1:1234">
        </div>
        <div>
          <label>{{LOCAL_MODEL_NAME_LABEL}}</label>
          <select id="local_model_select">{{LOCAL_MODEL_OPTIONS}}</select>
        </div>
        <div id="local_custom_wrap" {{LOCAL_CUSTOM_STYLE}}>
          <label>{{CUSTOM_LOCAL_MODEL_LABEL}}</label>
          <input id="local_model_custom" value="{{LOCAL_CUSTOM_VALUE}}" placeholder="qwen/qwen3-coder-30b">
        </div>
      </div>
    </div>

    <div class="ai-section">
      <div class="ai-section-title">{{PROMPT_SETTINGS_TITLE}}</div>
      <div class="ai-grid">
        <div>
          <label>{{SYSTEM_PROMPT_TEMPLATE_LABEL}}</label>
          <select id="system_prompt_select">{{SYSTEM_PROMPT_OPTIONS}}</select>
        </div>
        <div>
          <label>{{SYSTEM_TEMPLATE_REVIEW_LABEL}}</label>
          <div class="actions" style="margin-top:0;">
            <button class="btn" id="review_system_template_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{REVIEW_SYSTEM_PROMPT_TEXT}}</button>
          </div>
        </div>
      </div>
      <div class="ai-grid ai-row">
        <div>
          <label>{{TASK_PROMPT_TEMPLATE_LABEL}}</label>
          <select id="task_prompt_select">{{TASK_PROMPT_OPTIONS}}</select>
        </div>
        <div>
          <label>{{TEMPLATE_REVIEW_LABEL}}</label>
          <div class="actions" style="margin-top:0;">
            <button class="btn" id="review_task_template_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{REVIEW_TASK_PROMPT_TEXT}}</button>
          </div>
        </div>
      </div>
      <details class="ai-details ai-row">
        <summary>{{PROMPT_MGMT_OPTIONAL}}</summary>
        <div class="ai-grid ai-row">
          <div>
            <label>{{IMPORT_PROMPT_FILE_LABEL}}</label>
            <div class="file-picker">
              <label for="prompt_file" class="file-btn">{{CHOOSE_FILE_TEXT}}</label>
              <span id="prompt_file_name" class="file-name">{{NO_FILE_TEXT}}</span>
            </div>
            <input id="prompt_file" class="file-real" type="file" accept=".txt">
          </div>
          <div>
            <label>{{IMPORT_TO_LABEL}}</label>
            <select id="prompt_kind_select">
              <option value="task" selected>{{TASK_PROMPT_TEXT}}</option>
              <option value="system">{{SYSTEM_PROMPT_TEXT}}</option>
            </select>
          </div>
        </div>
        <div class="ai-grid ai-row">
          <div>
            <label>{{IMPORT_NAME_LABEL}}</label>
            <input id="prompt_name" type="text" placeholder="{{IMPORT_NAME_PLACEHOLDER}}">
          </div>
          <div style="display:flex;align-items:end;">
            <button class="btn" id="import_prompt_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{IMPORT_PROMPT_TEXT}}</button>
          </div>
        </div>
      </details>
    </div>

  </div>
</div>
<div id="prompt_editor_modal" class="modal-mask">
  <div class="modal-box">
    <div class="modal-head">
      <div id="prompt_editor_title" class="modal-title">{{EDIT_PROMPT_TITLE}}</div>
      <button id="close_prompt_editor_btn" class="modal-close" type="button">{{CLOSE_TEXT}}</button>
    </div>
    <div class="modal-body">
      <textarea id="prompt_editor_text"></textarea>
    </div>
    <div class="actions">
      <button class="btn" id="save_prompt_edit_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{SAVE_CHANGES_TEXT}}</button>
      <button class="btn" id="delete_prompt_btn" type="button" {{MODIFY_DISABLED_ATTR}}>{{DELETE_TEMPLATE_TEXT}}</button>
      <button class="btn" id="cancel_prompt_edit_btn" type="button">{{CANCEL_EDIT_TEXT}}</button>
    </div>
  </div>
</div>
