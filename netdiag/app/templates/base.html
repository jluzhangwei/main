<!doctype html>
<html lang="{{ 'en' if request and request.query_params.get('lang', 'zh').lower().startswith('en') else 'zh-CN' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'AIOps - NetClaw' }}</title>
  <style>
    @import url('/shared/header/shared-header.css');
    :root {
      --bg:#f5f7fb; --card:#ffffff; --text:#1f2937; --line:#d8e0ea; --accent:#0f6cbd; --brand:#111; --navbg:#ffffff; --active:#0f6cbd;
      --shared-bg:#ffffff; --shared-text:#334155; --shared-line:#d9e2ec; --shared-link:#516175; --shared-btn-border:#c7d2de; --shared-btn-text:#334155;
      --shared-nav-line:#d9e2ec; --shared-title:#0f172a; --shared-menu:#4b5563; --shared-menu-active:#0f172a; --shared-menu-active-line:#0f6cbd;
    }
    html, body { height:100%; }
    body { margin:0; font-family: "Segoe UI", "PingFang SC", sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; overflow:hidden; }
    .topbar, .mainnav { flex:0 0 auto; }
    .topbar { justify-content:flex-start; background:#ffffff !important; border-bottom:1px solid #d9e2ec !important; }
    .mainnav { background:#f7f9fc !important; border-bottom:1px solid #d9e2ec !important; }
    .app-body { display:grid; grid-template-columns:54px minmax(0,1fr); flex:1 1 auto; min-height:0; }
    .left-rail { background:#f3f5f8; border-right:1px solid #d9e2ec; display:flex; flex-direction:column; align-items:center; padding:10px 6px; gap:8px; overflow:auto; }
    .rail-btn { width:40px; height:40px; border:1px solid #d0d9e4; border-radius:10px; background:#ffffff; color:#5b6b7e; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:18px; cursor:pointer; }
    .rail-btn:hover, .rail-btn.active { color:#0f6cbd; border-color:#8bb8de; background:#eaf3fb; }
    .rail-btn svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .wrap { width:100%; max-width:none; margin:0; padding:10px; box-sizing:border-box; min-height:0; overflow:auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:12px; }
    h2 { margin:4px 0 10px; font-size:21px; }
    h3 { margin:4px 0 8px; font-size:16px; }
    label { display:block; margin:7px 0 3px; font-weight:600; font-size:13px; }
    input, select, textarea, button { padding:7px 9px; border:1px solid var(--line); border-radius:8px; box-sizing:border-box; font-size:14px; color:var(--text); }
    input, select, textarea { background:#ffffff; }
    form input, form select { width:100%; max-width:360px; }
    form textarea { width:100%; max-width:640px; min-height:110px; }
    button { width:auto; min-width:150px; background:var(--accent); color:#fff; font-weight:700; cursor:pointer; }
    table { width:100%; border-collapse:collapse; font-size:13px; background:#ffffff; }
    th, td { border-bottom:1px solid var(--line); padding:7px; text-align:left; vertical-align:top; }
    .row { display:grid; grid-template-columns:repeat(2,minmax(210px,1fr)); gap:8px 12px; align-items:end; }
    .muted { color:#64748b; font-size:12px; margin:4px 0 0; }
    .error { color:#c72020; font-weight:700; font-size:13px; margin-bottom:8px; }
    .menu { flex-wrap:wrap; row-gap:0; }
    .menu a { font-size:14px; padding:14px 0 11px; }
    .mainnav { min-height:44px; }
    .topbar .app-circle-btn { background:#ffffff !important; }
    .logo-switch-wrap {
      width:240px;
      min-width:200px;
      height:64px;
      display:block;
      cursor:pointer;
      user-select:none;
      outline:none;
    }
    .logo-switch-wrap .infra-logo {
      width:100%;
      min-width:0;
      height:100%;
      object-fit:contain;
      display:block;
    }
    a { color:#0f6cbd; }
    /* Legacy page compatibility: keep all pages in unified light workspace style */
    .task-page .card,
    .ai-card,
    .ai-section,
    .ai-details,
    .kpi,
    .exec-card,
    .modal-box { background:#ffffff !important; color:#1f2937 !important; border-color:#d8e0ea !important; }
    .task-page th,
    .task-page td,
    .task-page th,
    .card table th,
    .card table td { color:#1f2937 !important; border-color:#d8e0ea !important; }
    .task-page th,
    .card table th { background:#f3f6fa !important; }
    .task-page a,
    .card a { color:#0f6cbd !important; }
    .task-page .btn,
    .task-page .task-delete,
    .btn,
    .file-btn,
    .modal-close { background:#ffffff !important; color:#1f2937 !important; border-color:#cdd7e3 !important; }
    .card pre,
    .card .terminal-box,
    .card .markdown-body,
    .card .check-detail,
    .card .flow-timeline,
    .card .wizard-summary,
    .card .table-wrap { background:#f8fafc !important; color:#1f2937 !important; border-color:#d8e0ea !important; }
    .card blockquote { background:#f1f5f9 !important; color:#334155 !important; border-color:#94a3b8 !important; }
    .card code { background:#eef2f7 !important; border-color:#d7dee7 !important; color:#1f2937 !important; }
    .analysis-progress,
    .analysis-progress-bar { background:#eef3f8 !important; border-color:#d8e0ea !important; }
    @media (max-width: 780px) {
      .app-body { grid-template-columns:1fr; grid-template-rows:auto minmax(0,1fr); }
      .left-rail { flex-direction:row; justify-content:flex-start; padding:8px; border-right:none; border-bottom:1px solid #d9e2ec; }
      .wrap { max-width:100%; }
      .row { grid-template-columns:1fr; }
      form input, form select, form textarea { max-width:100%; }
      button { width:100%; }
      .logo-switch-wrap {
        width:188px;
        min-width:188px;
        height:50px;
      }
    }
  </style>
</head>
<body>
{% set path = request.url.path if request and request.url else '/' %}
{% set lang_raw = request.query_params.get('lang', 'zh') if request else 'zh' %}
{% set lang = 'en' if lang_raw.lower().startswith('en') else 'zh' %}
<div class="topbar">
  <div class="brand">
    <div
      id="logo_switch_wrap"
      class="logo-switch-wrap"
      role="button"
      tabindex="0"
      title="{{ 'Double-click to switch logo' if lang == 'en' else '双击切换 Logo' }}"
      aria-label="{{ 'Double-click to switch logo' if lang == 'en' else '双击切换 Logo' }}"
    >
      <img
        id="top_logo_img"
        class="infra-logo"
        src="/shared/header/infra-logo.png"
        alt="infra logo"
        data-logo-default="/shared/header/infra-logo.png"
        data-logo-alt="/static/logo-alt.png"
      />
    </div>
  </div>
</div>
<div class="mainnav">
  <div class="mainnav-left">
    <div class="site-title">AIOps - NetClaw</div>
  </div>
</div>
<div class="app-body">
  <svg width="0" height="0" style="position:absolute">
    <symbol id="ico_topology" viewBox="0 0 24 24">
      <rect x="2.5" y="3" width="5" height="5" rx="1"></rect>
      <rect x="16.5" y="3" width="5" height="5" rx="1"></rect>
      <rect x="9.5" y="16" width="5" height="5" rx="1"></rect>
      <path d="M7.5 5.5h9"></path>
      <path d="M5 8v4.5h7"></path>
      <path d="M19 8v4.5h-7"></path>
    </symbol>
    <symbol id="ico_control" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="14" rx="2"></rect>
      <path d="M7 9h10"></path>
      <path d="M7 13h6"></path>
      <circle cx="17" cy="13" r="1.5"></circle>
      <path d="M10 18v3"></path>
      <path d="M14 18v3"></path>
    </symbol>
    <symbol id="ico_library" viewBox="0 0 24 24">
      <rect x="4" y="3" width="4" height="18" rx="1"></rect>
      <rect x="10" y="3" width="4" height="18" rx="1"></rect>
      <path d="M20 4v17"></path>
      <path d="M16 8h4"></path>
      <path d="M16 14h4"></path>
    </symbol>
    <symbol id="ico_lab" viewBox="0 0 24 24">
      <path d="M9 3h6"></path>
      <path d="M10 3v5l-5 8a3 3 0 0 0 2.6 4.5h8.8A3 3 0 0 0 19 16l-5-8V3"></path>
      <path d="M8.5 14h7"></path>
    </symbol>
    <symbol id="ico_settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3.2"></circle>
      <path d="M19.4 15a7.9 7.9 0 0 0 .1-2l2-1.2-2-3.4-2.2.8a7.4 7.4 0 0 0-1.7-1L15.2 6h-4.4l-.4 2.2a7.4 7.4 0 0 0-1.7 1l-2.2-.8-2 3.4L6.5 13a7.9 7.9 0 0 0 .1 2l-2 1.2 2 3.4 2.2-.8a7.4 7.4 0 0 0 1.7 1l.4 2.2h4.4l.4-2.2a7.4 7.4 0 0 0 1.7-1l2.2.8 2-3.4-2-1.2Z"></path>
    </symbol>
    <symbol id="ico_ai" viewBox="0 0 24 24">
      <rect x="4" y="5" width="16" height="14" rx="3"></rect>
      <path d="M12 2.5V5"></path>
      <path d="M8 11h8"></path>
      <path d="M8 14h5"></path>
      <circle cx="9" cy="9" r="1"></circle>
      <circle cx="15" cy="9" r="1"></circle>
    </symbol>
    <symbol id="ico_runner" viewBox="0 0 24 24">
      <path d="M5 4h14"></path>
      <path d="M8 9h8"></path>
      <path d="M12 13v7"></path>
      <path d="m9 17 3 3 3-3"></path>
    </symbol>
    <symbol id="ico_tasks" viewBox="0 0 24 24">
      <rect x="4" y="3" width="16" height="18" rx="2"></rect>
      <path d="M8 8h8"></path>
      <path d="M8 12h8"></path>
      <path d="M8 16h5"></path>
    </symbol>
    <symbol id="ico_docs" viewBox="0 0 24 24">
      <path d="M7 3h7l4 4v14H7z"></path>
      <path d="M14 3v4h4"></path>
      <path d="M10 12h5"></path>
      <path d="M10 16h5"></path>
    </symbol>
  </svg>
  <aside class="left-rail">
    <a class="rail-btn {{ 'active' if path == '/netdiag' else '' }}" href="/netdiag?lang={{ lang }}" title="{{ 'Diagnosis Workbench' if lang == 'en' else '诊断工作台' }}"><svg aria-hidden="true"><use href="#ico_topology"></use></svg></a>
    <a class="rail-btn {{ 'active' if path.startswith('/netdiag/control') else '' }}" href="/netdiag/control?lang={{ lang }}" title="{{ 'Connection Control' if lang == 'en' else '连接控制' }}"><svg aria-hidden="true"><use href="#ico_control"></use></svg></a>
    <a class="rail-btn {{ 'active' if path.startswith('/netdiag/sessions') else '' }}" href="/netdiag/sessions?lang={{ lang }}" title="{{ 'Session History' if lang == 'en' else '历史会话' }}"><svg aria-hidden="true"><use href="#ico_tasks"></use></svg></a>
    <a class="rail-btn {{ 'active' if path.startswith('/netdiag/learning') else '' }}" href="/netdiag/learning?lang={{ lang }}" title="{{ 'Knowledge Library' if lang == 'en' else '知识库与学习' }}"><svg aria-hidden="true"><use href="#ico_library"></use></svg></a>
    <a class="rail-btn {{ 'active' if path.startswith('/netdiag/lab') else '' }}" href="/netdiag/lab?lang={{ lang }}" title="{{ 'Lab Simulation' if lang == 'en' else '实验模拟对抗' }}"><svg aria-hidden="true"><use href="#ico_lab"></use></svg></a>
    <a class="rail-btn {{ 'active' if path.startswith('/ai/settings') else '' }}" href="/ai/settings?lang={{ lang }}" title="{{ 'AI Settings' if lang == 'en' else 'AI 参数设置' }}"><svg aria-hidden="true"><use href="#ico_ai"></use></svg></a>
    <a class="rail-btn {{ 'active' if path.startswith('/help') else '' }}" href="/help?lang={{ lang }}" title="{{ 'Playbook Docs' if lang == 'en' else '操作文档' }}"><svg aria-hidden="true"><use href="#ico_docs"></use></svg></a>
  </aside>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</div>
<script>
  (function () {
    const KEY = 'netdiag_logo_variant';
    const wrap = document.getElementById('logo_switch_wrap');
    const img = document.getElementById('top_logo_img');
    if (!wrap || !img) return;

    const defaultSrc = String(img.dataset.logoDefault || '/shared/header/infra-logo.png');
    const altSrc = String(img.dataset.logoAlt || '/static/logo-alt.png');

    function applyVariant(variant) {
      const useAlt = String(variant || '').toLowerCase() === 'alt';
      img.src = useAlt ? altSrc : defaultSrc;
      img.dataset.variant = useAlt ? 'alt' : 'default';
    }

    function toggleVariant() {
      const current = String(img.dataset.variant || 'default').toLowerCase();
      const next = current === 'alt' ? 'default' : 'alt';
      try {
        localStorage.setItem(KEY, next);
      } catch (e) {}
      applyVariant(next);
    }

    try {
      const saved = String(localStorage.getItem(KEY) || 'default').toLowerCase();
      applyVariant(saved === 'alt' ? 'alt' : 'default');
    } catch (e) {
      applyVariant('default');
    }

    img.addEventListener('error', function () {
      if (String(img.dataset.variant || '').toLowerCase() !== 'alt') return;
      try {
        localStorage.setItem(KEY, 'default');
      } catch (e) {}
      applyVariant('default');
    });

    wrap.addEventListener('dblclick', function (ev) {
      ev.preventDefault();
      toggleVariant();
    });

    wrap.addEventListener('keydown', function (ev) {
      if (ev.key !== 'Enter') return;
      ev.preventDefault();
      toggleVariant();
    });
  })();
</script>
</body>
</html>
