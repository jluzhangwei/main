<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'AIOps - Netlog Extractor' }}</title>
  <style>
    :root { --bg:#f6f8fb; --card:#fff; --text:#1b2430; --line:#d6dde8; --accent:#006c9c; --brand:#111; --navbg:#ffffff; --active:#d43a2f; }
    body { margin:0; font-family: "Segoe UI", "PingFang SC", sans-serif; background:var(--bg); color:var(--text); }
    .topbar {
      background: var(--brand);
      color: #fff;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 8px 18px;
      gap: 14px;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 0;
    }
    .brand-name { font-size: 21px; font-weight: 700; color:#fff; white-space:nowrap; }
    .sea-lockup {
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border-radius:10px;
      padding:2px 8px 2px 2px;
      line-height:1;
    }
    .sea-mark { width:42px; height:42px; display:block; }
    .sea-text {
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:1px;
    }
    .sea-text-main {
      font-size:20px;
      font-weight:800;
      color:#1e2b8f;
      letter-spacing:.2px;
    }
    .sea-text-sub {
      font-size:9px;
      color:#1e2b8f;
      opacity:.9;
      letter-spacing:.1px;
    }
    .top-links { display:flex; align-items:center; gap:12px; font-size:14px; color:#e5e7eb; white-space:nowrap; }
    .top-links a { color:#e5e7eb; text-decoration:none; }
    .mainnav {
      background: var(--navbg);
      border-bottom: 1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 0 18px;
      min-height: 58px;
      gap: 10px;
    }
    .mainnav-left { display:flex; align-items:center; gap:12px; min-width:0; flex:1; }
    .site-title { font-size: 22px; font-weight: 700; color:#303643; white-space:nowrap; }
    .menu { display:flex; align-items:center; gap:16px; margin-left:auto; justify-content:flex-end; }
    .menu a {
      color:#374151;
      text-decoration:none;
      font-size:15px;
      font-weight:600;
      padding: 18px 0 14px;
      border-bottom: 3px solid transparent;
    }
    .menu a.active { color:#111827; border-bottom-color: var(--active); }
    .wrap { max-width:980px; margin:16px auto; padding:0 14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:12px; }
    h2 { margin:4px 0 10px; font-size:21px; }
    h3 { margin:4px 0 8px; font-size:16px; }
    label { display:block; margin:7px 0 3px; font-weight:600; font-size:13px; }
    input, select, textarea, button { padding:7px 9px; border:1px solid var(--line); border-radius:8px; box-sizing:border-box; font-size:14px; }
    form input, form select { width:100%; max-width:360px; }
    form textarea { width:100%; max-width:640px; min-height:110px; }
    button { width:auto; min-width:150px; background:var(--accent); color:#fff; font-weight:700; cursor:pointer; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { border-bottom:1px solid var(--line); padding:7px; text-align:left; vertical-align:top; }
    .row { display:grid; grid-template-columns:repeat(2,minmax(210px,1fr)); gap:8px 12px; align-items:end; }
    .muted { color:#6a7480; font-size:12px; margin:4px 0 0; }
    .error { color:#c72020; font-weight:700; font-size:13px; margin-bottom:8px; }
    @media (max-width: 780px) {
      .topbar, .mainnav { padding-left:12px; padding-right:12px; }
      .brand-name { font-size: 17px; }
      .sea-mark { width:34px; height:34px; }
      .sea-text-main { font-size:16px; }
      .sea-text-sub { font-size:7px; }
      .site-title { font-size: 18px; }
      .menu { gap:12px; flex-wrap:wrap; }
      .menu a { font-size:14px; padding:10px 0 8px; }
      .mainnav { align-items:flex-end; padding-top:4px; padding-bottom:4px; }
      .mainnav-left { flex-direction:column; align-items:flex-start; gap:4px; }
      .top-links { display:none; }
      .wrap { max-width:100%; }
      .row { grid-template-columns:1fr; }
      form input, form select, form textarea { max-width:100%; }
      button { width:100%; }
    }
  </style>
</head>
<body>
{% set path = request.url.path if request and request.url else '/' %}
<div class="topbar">
  <div class="brand">
    <div class="sea-lockup" aria-label="Sea Limited logo">
      <svg class="sea-mark" viewBox="0 0 100 100" role="img" aria-hidden="true">
        <defs>
          <clipPath id="seaClip"><circle cx="50" cy="50" r="48"/></clipPath>
        </defs>
        <circle cx="50" cy="50" r="48" fill="#d9eef7"/>
        <g clip-path="url(#seaClip)">
          <path d="M-5 18 C 20 6, 45 8, 105 20 L105 36 C60 26, 30 24, -5 34 Z" fill="#f35a31"/>
          <path d="M-5 32 C 25 22, 55 24, 105 36 L105 52 C62 44, 30 42, -5 48 Z" fill="#f28a2a"/>
          <path d="M-5 46 C 24 40, 55 42, 105 52 L105 66 C62 58, 31 56, -5 60 Z" fill="#10b981"/>
          <path d="M-5 58 C 24 54, 56 56, 105 66 L105 80 C62 74, 30 72, -5 74 Z" fill="#22d3ee"/>
          <path d="M-5 72 C 26 70, 58 72, 105 80 L105 95 C62 91, 30 90, -5 90 Z" fill="#2563eb"/>
          <path d="M-5 86 C 30 87, 62 88, 105 95 L105 110 L-5 110 Z" fill="#1e3a8a"/>
        </g>
      </svg>
      <div class="sea-text">
        <span class="sea-text-main">sea</span>
        <span class="sea-text-sub">connecting the dots</span>
      </div>
    </div>
    <div class="brand-name">SEA</div>
  </div>
  <div class="top-links">
    <a href="/help">Help</a>
  </div>
</div>
<div class="mainnav">
  <div class="mainnav-left">
    <div class="site-title">AIOps - Netlog Extractor</div>
    <div class="menu">
      <a href="/" class="{{ 'active' if path == '/' else '' }}">Create Task</a>
      <a href="/tasks" class="{{ 'active' if path.startswith('/tasks') else '' }}">Tasks</a>
      <a href="/ai/settings" class="{{ 'active' if path.startswith('/ai/settings') else '' }}">AI Settings</a>
    </div>
  </div>
</div>
<div class="wrap">
  {% block content %}{% endblock %}
</div>
</body>
</html>
