<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Hub - 登录</title>
  <style>
    @import url('/shared/header/shared-header.css');
    :root {
      --bg:#f6f8fb;
      --card:#fff;
      --line:#d6dde8;
      --text:#1b2430;
      --accent:#006c9c;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"Segoe UI","PingFang SC",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap { max-width:520px; margin:26px auto; padding:0 14px; }
    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:22px 20px;
    }
    h1 { margin:0 0 6px; font-size:30px; text-align:center; }
    .sub { margin:0 0 14px; text-align:center; color:#5f6b7f; }
    label { display:block; margin:9px 0 6px; font-weight:700; }
    input {
      width:100%;
      border:1px solid #c8d3e1;
      border-radius:8px;
      padding:10px;
      font-size:14px;
    }
    .status {
      margin:0 0 10px;
      border:1px solid #f5b4b4;
      background:#fff3f3;
      color:#8b1f1f;
      border-radius:8px;
      padding:8px 10px;
      font-size:13px;
    }
    button {
      margin-top:14px;
      width:100%;
      border:0;
      border-radius:8px;
      padding:10px;
      background:var(--accent);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
    }
    .tips { margin-top:10px; color:#5f6b7f; font-size:12px; text-align:center; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img class="infra-logo" src="/shared/header/infra-logo.png" alt="infra logo" />
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Service Hub</h1>
      <p class="sub">请登录后管理服务启动</p>
      {% if status %}
      <div class="status">{{ status }}</div>
      {% endif %}
      <form method="post" action="/login" autocomplete="off">
        <input type="hidden" name="next_path" value="{{ next_path }}" />
        <label>用户名</label>
        <input type="text" name="username" autocomplete="off" required />
        <label>密码</label>
        <input type="password" name="password" autocomplete="new-password" required />
        <button type="submit">登录</button>
      </form>
      <div class="tips">默认管理员账号请联系维护人员获取。</div>
    </div>
  </div>
</body>
</html>
