<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Hub - 登录</title>
  <style>
    :root {
      --bg:#f6f8fb;
      --card:#fff;
      --line:#d6dde8;
      --text:#1b2430;
      --brand:#111;
      --accent:#006c9c;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"Segoe UI","PingFang SC",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .topbar {
      background:var(--brand);
      color:#fff;
      display:flex;
      align-items:center;
      padding:8px 18px;
      gap:12px;
    }
    .sea-lockup {
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border-radius:10px;
      padding:2px 8px 2px 2px;
      line-height:1;
    }
    .sea-mark { width:42px; height:42px; display:block; }
    .sea-text-main { font-size:20px; font-weight:800; color:#1e2b8f; }
    .sea-text-sub { font-size:9px; color:#1e2b8f; opacity:.9; }
    .brand-name { font-size:21px; font-weight:700; }
    .wrap { max-width:520px; margin:26px auto; padding:0 14px; }
    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:22px 20px;
    }
    h1 { margin:0 0 6px; font-size:30px; text-align:center; }
    .sub { margin:0 0 14px; text-align:center; color:#5f6b7f; }
    label { display:block; margin:9px 0 6px; font-weight:700; }
    input {
      width:100%;
      border:1px solid #c8d3e1;
      border-radius:8px;
      padding:10px;
      font-size:14px;
    }
    .status {
      margin:0 0 10px;
      border:1px solid #f5b4b4;
      background:#fff3f3;
      color:#8b1f1f;
      border-radius:8px;
      padding:8px 10px;
      font-size:13px;
    }
    button {
      margin-top:14px;
      width:100%;
      border:0;
      border-radius:8px;
      padding:10px;
      background:var(--accent);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
    }
    .tips { margin-top:10px; color:#5f6b7f; font-size:12px; text-align:center; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="sea-lockup" aria-label="Sea Limited logo">
      <svg class="sea-mark" viewBox="0 0 100 100" role="img" aria-hidden="true">
        <defs>
          <clipPath id="seaClip"><circle cx="50" cy="50" r="48" /></clipPath>
        </defs>
        <circle cx="50" cy="50" r="48" fill="#d9eef7" />
        <g clip-path="url(#seaClip)">
          <path d="M-5 18 C 20 6, 45 8, 105 20 L105 36 C60 26, 30 24, -5 34 Z" fill="#f35a31" />
          <path d="M-5 32 C 25 22, 55 24, 105 36 L105 52 C62 44, 30 42, -5 48 Z" fill="#f28a2a" />
          <path d="M-5 46 C 24 40, 55 42, 105 52 L105 66 C62 58, 31 56, -5 60 Z" fill="#10b981" />
          <path d="M-5 58 C 24 54, 56 56, 105 66 L105 80 C62 74, 30 72, -5 74 Z" fill="#22d3ee" />
          <path d="M-5 72 C 26 70, 58 72, 105 80 L105 95 C62 91, 30 90, -5 90 Z" fill="#2563eb" />
          <path d="M-5 86 C 30 87, 62 88, 105 95 L105 110 L-5 110 Z" fill="#1e3a8a" />
        </g>
      </svg>
      <div>
        <div class="sea-text-main">sea</div>
        <div class="sea-text-sub">connecting the dots</div>
      </div>
    </div>
    <div class="brand-name">SEA NOC</div>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Service Hub</h1>
      <p class="sub">请登录后管理服务启动</p>
      {% if status %}
      <div class="status">{{ status }}</div>
      {% endif %}
      <form method="post" action="/login" autocomplete="off">
        <input type="hidden" name="next_path" value="{{ next_path }}" />
        <label>用户名</label>
        <input type="text" name="username" autocomplete="off" required />
        <label>密码</label>
        <input type="password" name="password" autocomplete="new-password" required />
        <button type="submit">登录</button>
      </form>
      <div class="tips">默认管理员账号请联系维护人员获取。</div>
    </div>
  </div>
</body>
</html>
